<!DOCTYPE html>
<html lang="en" class="">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>MedBill Pro</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config={darkMode:'class',theme:{extend:{fontFamily:{sans:['Inter','system-ui','sans-serif']}}}}
</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;padding-bottom:env(safe-area-inset-bottom)}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-thumb{background:#94a3b8;border-radius:4px}
::-webkit-scrollbar-track{background:transparent}

@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
@keyframes scaleIn{from{opacity:0;transform:scale(.92)}to{opacity:1;transform:scale(1)}}
@keyframes toastIn{from{opacity:0;transform:translateX(80px)}to{opacity:1;transform:translateX(0)}}
@keyframes toastOut{from{opacity:1;transform:translateX(0)}to{opacity:0;transform:translateX(80px)}}
@keyframes rippleEffect{0%{transform:scale(0);opacity:.5}100%{transform:scale(2.5);opacity:0}}
@keyframes sectionReveal{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
@keyframes fabGlow{0%,100%{box-shadow:0 0 5px rgba(5,150,105,.4),0 0 20px rgba(5,150,105,.15)}50%{box-shadow:0 0 15px rgba(5,150,105,.6),0 0 35px rgba(5,150,105,.25)}}

.section-reveal{opacity:0;animation:sectionReveal .6s cubic-bezier(.16,1,.3,1) both}
.anim-fade{animation:fadeIn .3s ease both}
.anim-scale{animation:scaleIn .3s cubic-bezier(.16,1,.3,1) both}
.anim-slide-up{animation:slideUp .35s cubic-bezier(.16,1,.3,1) both}

.t-in{animation:toastIn .4s cubic-bezier(.16,1,.3,1) both}
.t-out{animation:toastOut .3s ease both}

.btn-tap:active{transform:scale(.96);transition:transform .08s}

.ripple-host{position:relative;overflow:hidden}
.ripple-host .ripple-circle{position:absolute;border-radius:50%;background:rgba(255,255,255,.45);pointer-events:none;animation:rippleEffect .55s ease-out forwards;transform:scale(0)}
.fab-glow{animation:fabGlow 2.5s ease-in-out infinite}

input:focus,select:focus,textarea:focus{outline:none;box-shadow:0 0 0 3px rgba(5,150,105,.18);border-color:#059669!important}
.dark input:focus,.dark select:focus,.dark textarea:focus{box-shadow:0 0 0 3px rgba(16,185,129,.2);border-color:#10b981!important}

.card-hover{transition:all .25s cubic-bezier(.16,1,.3,1)}
.card-hover:hover{transform:translateY(-4px);box-shadow:0 12px 40px -12px rgba(0,0,0,.15)}
.dark .card-hover:hover{box-shadow:0 12px 40px -12px rgba(0,0,0,.4)}
.glass{backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px)}
</style>
</head>
<body class="bg-gray-50 dark:bg-slate-950 text-slate-800 dark:text-slate-200 antialiased transition-colors">

<div id="app"></div>
<div id="toasts" class="fixed top-4 right-4 z-[999] flex flex-col gap-2.5 pointer-events-none max-w-sm"></div>
<div id="inv-export" style="position:fixed;left:-9999px;top:0;z-index:-1;width:800px;background:#fff"></div>
<input type="file" id="f-json" accept=".json" class="hidden">
<input type="file" id="f-logo" accept="image/*" class="hidden">
<input type="file" id="f-sig" accept="image/*" class="hidden">

function ic(name,w=18,h=18){return`<span class="inline-flex items-center justify-center" style="width:${w}px;height:${h}px">${IC[name]||''}</span>`}
function icS(name,s=16){return ic(name,s,s)}

const SK='medbill_v7';
function defState(){return{tab:'dashboard',invoices:[],profile:{appName:'MedBill Pro',chamberName:'HealthFirst Medical Chamber',address:'123 Medical Plaza, Dhanmondi, Dhaka 1205',phone:'+880 1712-345678',email:'info@healthfirst.com.bd',logo:null,signature:null,doctorName:'Dr. Aminul Haque',doctorDegree:'MBBS, FCPS (Medicine)',currency:'BDT',sym:'৳'},nextNum:1001,search:'',filter:'all',theme:'system',showInvoice:false,editId:null,showSettings:false,settingsTab:'profile',viewInvId:null}}
let S=loadS();
function loadS(){try{const d=localStorage.getItem(SK);if(d){const p=JSON.parse(d);return{...defState(),...p,showInvoice:false,showSettings:false,settingsTab:'profile',viewInvId:null}}}catch(e){}return defState()}
function saveS(){try{localStorage.setItem(SK,JSON.stringify(S))}catch(e){}}

function getSystemDark(){try{return window.matchMedia('(prefers-color-scheme: dark)').matches}catch(e){return false}}
function applyTheme(){const h=document.documentElement;h.classList.remove('dark');const isDark=S.theme==='dark'||(S.theme==='system'&&getSystemDark());if(isDark)h.classList.add('dark')}
function setTheme(t){S.theme=t;saveS();applyTheme();render()}
applyTheme();
try{window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change',()=>{if(S.theme==='system')applyTheme()})}catch(e){}

function gid(){return'inv_'+Date.now().toString(36)+Math.random().toString(36).substr(2,5)}
function fc(a){return S.profile.sym+' '+Number(a||0).toFixed(2)}
function fd(d){if(!d)return'—';return new Date(d).toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'})}
function today(){return new Date().toISOString().split('T')[0]}
function nowTime(){const d=new Date();return d.getHours().toString().padStart(2,'0')+':'+d.getMinutes().toString().padStart(2,'0')}

function toast(msg,type='success'){const c=document.getElementById('toasts');const cols={success:'bg-emerald-600 dark:bg-emerald-700',error:'bg-red-600',info:'bg-slate-700',warning:'bg-amber-500'};const t=document.createElement('div');t.className=`pointer-events-auto flex items-center gap-2.5 px-4 py-3 rounded-xl shadow-lg text-white text-sm font-medium ${cols[type]||cols.info} t-in`;t.innerHTML=`${icS('chk',16)}<span>${msg}</span>`;c.appendChild(t);setTimeout(()=>{t.classList.replace('t-in','t-out');setTimeout(()=>t.remove(),300)},3000)}
function confirm2(msg,cb){const m=document.createElement('div');m.className='fixed inset-0 z-[500] flex items-center justify-center p-4';m.style.cssText='background:rgba(0,0,0,.5);backdrop-filter:blur(4px)';m.innerHTML=`<div class="bg-white dark:bg-slate-800 rounded-2xl shadow-2xl p-6 w-full max-w-sm anim-scale"><h3 class="text-base font-bold text-slate-900 dark:text-white mb-2">Confirm</h3><p class="text-sm text-slate-500 dark:text-slate-400 mb-6">${msg}</p><div class="flex gap-3 justify-end"><button class="cbtn px-4 py-2 text-sm font-medium border border-gray-200 dark:border-slate-600 hover:bg-gray-50 dark:hover:bg-slate-700 rounded-lg dark:text-slate-300">Cancel</button><button class="obtn px-4 py-2 text-sm font-semibold bg-red-600 hover:bg-red-700 text-white rounded-lg">Delete</button></div></div>`;document.body.appendChild(m);m.querySelector('.cbtn').onclick=()=>m.remove();m.querySelector('.obtn').onclick=()=>{m.remove();cb()};m.addEventListener('click',e=>{if(e.target===m)m.remove()})}

function calcSummary(items,docFee,discount){const tI=items.length;const tQ=items.reduce((s,i)=>s+(i.quantity||0),0);const pS=items.reduce((s,i)=>s+(i.quantity||0)*(i.unitPrice||0),0);const tP=pS+(docFee||0)-(discount||0);return{totalItems:tI,totalQty:tQ,productsSubtotal:pS,doctorFee:docFee||0,discount:discount||0,totalPayable:tP}}

function render(){const app=document.getElementById('app');app.innerHTML=renderHeader()+`<div class="pb-24">${renderContent()}</div>`+renderBottomNav();if(S.showInvoice)app.innerHTML+=renderInvoiceModal();if(S.showSettings)app.innerHTML+=renderSettingsModal();if(S.viewInvId)app.innerHTML+=renderViewModal()}

function renderHeader(){const p=S.profile;let themeIcon='system';if(S.theme==='light')themeIcon='moon';else if(S.theme==='dark')themeIcon='sun';else themeIcon=getSystemDark()?'sun':'moon';return`<header class="sticky top-0 z-40 bg-white/80 dark:bg-slate-900/80 glass border-b border-gray-100 dark:border-slate-800 transition-colors"><div class="flex items-center justify-between h-14 px-4 max-w-7xl mx-auto"><button data-act="open-settings" class="flex items-center gap-2.5 btn-tap">${p.logo?`<img src="${p.logo}" class="w-8 h-8 rounded-lg object-cover"/>`:`<div class="w-8 h-8 rounded-lg bg-emerald-600 flex items-center justify-center text-white">${icS('steth',18)}</div>`}<span class="text-base font-bold text-slate-900 dark:text-white hidden sm:block">${p.appName||'MedBill Pro'}</span></button><div class="flex items-center gap-1"><button data-act="toggle-theme" class="w-9 h-9 rounded-xl hover:bg-gray-100 dark:hover:bg-slate-800 flex items-center justify-center text-slate-500 dark:text-slate-400 transition-colors btn-tap" title="Theme">${icS(themeIcon,18)}</button><button data-act="open-settings" class="w-9 h-9 rounded-xl hover:bg-gray-100 dark:hover:bg-slate-800 flex items-center justify-center text-slate-500 dark:text-slate-400 transition-colors btn-tap" title="Settings">${icS('gear',18)}</button></div></div></header>`}

function renderContent(){if(S.tab==='dashboard')return renderDashboard();return renderPatients()}

function renderDashboard(){const invs=S.invoices;const totalRev=invs.reduce((s,i)=>s+i.totalPayable,0);const todayInvs=invs.filter(i=>i.date===today());const todayRev=todayInvs.reduce((s,i)=>s+i.totalPayable,0);const totalDue=invs.reduce((s,i)=>s+Math.max(0,i.totalPayable-(i.cashReceived||0)),0);const recent=[...invs].sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt)).slice(0,6);const days=[];const revs=[];for(let i=6;i>=0;i--){const d=new Date();d.setDate(d.getDate()-i);const ds=d.toISOString().split('T')[0];days.push(d.toLocaleDateString('en-GB',{weekday:'short'}));revs.push(invs.filter(x=>x.date===ds).reduce((s,x)=>s+x.totalPayable,0))}const maxRev=Math.max(...revs,1);const stats=[{label:'Total Revenue',value:fc(totalRev),icon:'dollar',bg:'bg-emerald-50 dark:bg-emerald-900/30',ic:'bg-emerald-100 dark:bg-emerald-800/50 text-emerald-600 dark:text-emerald-400'},{label:'Total Patients',value:invs.length,icon:'user',bg:'bg-blue-50 dark:bg-blue-900/30',ic:'bg-blue-100 dark:bg-blue-800/50 text-blue-600 dark:text-blue-400'},{label:"Today's Revenue",value:fc(todayRev),icon:'cal',bg:'bg-violet-50 dark:bg-violet-900/30',ic:'bg-violet-100 dark:bg-violet-800/50 text-violet-600 dark:text-violet-400'},{label:'Total Due',value:fc(totalDue),icon:'award',bg:'bg-amber-50 dark:bg-amber-900/30',ic:'bg-amber-100 dark:bg-amber-800/50 text-amber-600 dark:text-amber-400'}];return`<main class="max-w-7xl mx-auto px-4 py-6"><div class="grid grid-cols-2 lg:grid-cols-4 gap-3 lg:gap-4 mb-6">${stats.map((s,i)=>`<div class="section-reveal ${s.bg} rounded-2xl p-4 lg:p-5 border border-gray-100 dark:border-slate-800" style="animation-delay:${200+i*100}ms"><div class="flex items-center justify-between mb-3"><div class="w-10 h-10 rounded-xl ${s.ic} flex items-center justify-center">${icS(s.icon,20)}</div></div><p class="text-xl lg:text-2xl font-bold text-slate-900 dark:text-white tracking-tight">${s.value}</p><p class="text-[11px] font-semibold text-slate-400 dark:text-slate-500 uppercase tracking-wider mt-1">${s.label}</p></div>`).join('')}</div><div class="grid grid-cols-1 lg:grid-cols-3 gap-4 lg:gap-6"><div class="section-reveal lg:col-span-2 bg-white dark:bg-slate-900 rounded-2xl border border-gray-100 dark:border-slate-800 p-5" style="animation-delay:600ms"><h3 class="text-sm font-bold text-slate-900 dark:text-white mb-4">Revenue — Last 7 Days</h3><div class="flex items-end gap-2 h-36">${days.map((d,i)=>{const h=Math.max(4,(revs[i]/maxRev)*100);return`<div class="flex-1 flex flex-col items-center gap-1"><span class="text-[10px] font-semibold text-slate-400 dark:text-slate-500">${revs[i]>0?fc(revs[i]):''}</span><div class="w-full rounded-t-lg transition-all duration-500 ${revs[i]>0?'bg-emerald-500 dark:bg-emerald-600':'bg-gray-200 dark:bg-slate-700'}" style="height:${h}%"></div><span class="text-[10px] font-medium text-slate-400 dark:text-slate-500">${d}</span></div>`}).join('')}</div></div><div class="section-reveal bg-white dark:bg-slate-900 rounded-2xl border border-gray-100 dark:border-slate-800 overflow-hidden" style="animation-delay:750ms"><div class="flex items-center justify-between px-5 py-3 border-b border-gray-50 dark:border-slate-800"><h3 class="text-sm font-bold text-slate-900 dark:text-white">Recent</h3><button data-tab="patients" class="text-xs text-emerald-600 dark:text-emerald-400 font-semibold hover:underline">View All</button></div>${recent.length===0?`<div class="p-8 text-center"><p class="text-sm text-slate-400">No invoices yet</p></div>`:`<div class="divide-y divide-gray-50 dark:divide-slate-800">${recent.map(inv=>`<div class="flex items-center justify-between px-5 py-2.5 hover:bg-gray-50 dark:hover:bg-slate-800/50 cursor-pointer transition-colors" data-act="view-inv" data-id="${inv.id}"><div><p class="text-sm font-semibold text-slate-800 dark:text-slate-200">${inv.patientName}</p><p class="text-[11px] text-slate-400">${inv.invoiceNumber} &middot; ${fd(inv.date)}</p></div><span class="text-sm font-bold text-emerald-600 dark:text-emerald-400">${fc(inv.totalPayable)}</span></div>`).join('')}</div>`}</div></div><div class="grid grid-cols-1 sm:grid-cols-3 gap-4 mt-6"><div class="section-reveal bg-white dark:bg-slate-900 rounded-2xl border border-gray-100 dark:border-slate-800 p-5" style="animation-delay:900ms"><div class="flex items-center gap-3 mb-2">${icS('pill',20)}<span class="text-sm font-bold text-slate-900 dark:text-white">Top Medicines</span></div>${getTopMeds().map(m=>`<div class="flex justify-between text-xs py-1"><span class="text-slate-500 dark:text-slate-400">${m.name}</span><span class="font-semibold text-slate-700 dark:text-slate-300">${m.count}x</span></div>`).join('')||'<p class="text-xs text-slate-400">No data</p>'}</div><div class="section-reveal bg-white dark:bg-slate-900 rounded-2xl border border-gray-100 dark:border-slate-800 p-5" style="animation-delay:1000ms"><div class="flex items-center gap-3 mb-2">${icS('cal',20)}<span class="text-sm font-bold text-slate-900 dark:text-white">Today's Summary</span></div><div class="space-y-1.5"><div class="flex justify-between text-xs"><span class="text-slate-500 dark:text-slate-400">Invoices</span><span class="font-semibold text-slate-700 dark:text-slate-300">${todayInvs.length}</span></div><div class="flex justify-between text-xs"><span class="text-slate-500 dark:text-slate-400">Revenue</span><span class="font-semibold text-emerald-600">${fc(todayRev)}</span></div></div></div><div class="section-reveal bg-white dark:bg-slate-900 rounded-2xl border border-gray-100 dark:border-slate-800 p-5" style="animation-delay:1100ms"><div class="flex items-center gap-3 mb-2">${icS('dollar',20)}<span class="text-sm font-bold text-slate-900 dark:text-white">Payment Status</span></div><div class="space-y-1.5"><div class="flex justify-between text-xs"><span class="text-slate-500 dark:text-slate-400">Total Billed</span><span class="font-semibold text-slate-700 dark:text-slate-300">${fc(totalRev)}</span></div><div class="flex justify-between text-xs"><span class="text-slate-500 dark:text-slate-400">Due</span><span class="font-semibold text-red-500">${fc(totalDue)}</span></div></div></div></div></main>`}

function getTopMeds(){const m={};S.invoices.forEach(inv=>inv.items.forEach(it=>{if(it.name){m[it.name]=(m[it.name]||0)+it.quantity}}));return Object.entries(m).sort((a,b)=>b[1]-a[1]).slice(0,5).map(([name,count])=>({name,count}))}

// --- Patients Tab (Redesigned Cards) ---
function renderPatients(){
  let invs=[...S.invoices].sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt));
  if(S.search){const q=S.search.toLowerCase();invs=invs.filter(i=>i.patientName?.toLowerCase().includes(q)||i.patientMobile?.includes(q)||i.patientEmail?.toLowerCase().includes(q)||i.patientAddress?.toLowerCase().includes(q)||i.invoiceNumber?.toLowerCase().includes(q))}
  if(S.filter==='today')invs=invs.filter(i=>i.date===today());else if(S.filter==='due')invs=invs.filter(i=>(i.totalPayable-(i.cashReceived||0))>0);else if(S.filter==='paid')invs=invs.filter(i=>(i.totalPayable-(i.cashReceived||0))<=0);

  return`<main class="max-w-7xl mx-auto px-4 py-6 anim-fade">
    <div class="flex flex-col sm:flex-row gap-3 mb-6">
      <div class="relative flex-1"><span class="absolute left-3.5 top-1/2 -translate-y-1/2 text-slate-400">${icS('search',15)}</span><input id="p-search" type="text" value="${S.search}" placeholder="Search by name, phone, email, address..." class="w-full pl-10 pr-4 py-2.5 text-sm border border-gray-200 dark:border-slate-700 rounded-xl bg-white dark:bg-slate-900 dark:text-white"/></div>
      <select id="p-filter" class="px-3 py-2.5 text-sm border border-gray-200 dark:border-slate-700 rounded-xl bg-white dark:bg-slate-900 dark:text-white min-w-[120px]"><option value="all" ${S.filter==='all'?'selected':''}>All</option><option value="today" ${S.filter==='today'?'selected':''}>Today</option><option value="paid" ${S.filter==='paid'?'selected':''}>Paid</option><option value="due" ${S.filter==='due'?'selected':''}>Due</option></select>
    </div>
    ${invs.length===0?`<div class="text-center py-20 section-reveal" style="animation-delay:200ms"><div class="w-20 h-20 rounded-3xl bg-gray-100 dark:bg-slate-800 flex items-center justify-center mx-auto mb-4 text-slate-300 dark:text-slate-600">${icS('user',36)}</div><p class="text-slate-400 dark:text-slate-500 text-sm mb-1">${S.search?'No results found':'No patients yet'}</p></div>`:
    `<div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">${invs.map((inv,i)=>{const due=Math.max(0,inv.totalPayable-(inv.cashReceived||0));const isPaid=due<=0;return`<div class="section-reveal card-hover bg-white dark:bg-slate-900 rounded-2xl border border-gray-100 dark:border-slate-800 overflow-hidden" style="animation-delay:${150+i*60}ms">
      <!-- Top Section: Invoice Info & Amount -->
      <div class="p-4 pb-3 border-b border-gray-50 dark:border-slate-800">
        <div class="flex items-start justify-between mb-1">
          <div><p class="text-sm font-bold text-slate-900 dark:text-white">${inv.invoiceNumber}</p><p class="text-[11px] text-slate-400 flex items-center gap-1.5">${icS('cal',12)}${fd(inv.date)} ${inv.time?'<span class="mx-0.5">·</span><span class="flex items-center gap-1">'+icS('clock',12)+inv.time+'</span>':''}</p></div>
          <span class="bg-emerald-50 dark:bg-emerald-900/40 text-emerald-700 dark:text-emerald-400 text-xs font-bold px-3 py-1.5 rounded-full">${fc(inv.totalPayable)}</span>
        </div>
      </div>
      <!-- Middle Section: Patient Details -->
      <div class="p-4 pb-3 space-y-2">
        <p class="text-[15px] font-bold text-slate-900 dark:text-white">${inv.patientName||'—'}</p>
        ${inv.patientAddress?`<p class="text-xs text-slate-500 dark:text-slate-400 flex items-start gap-1.5">${icS('map',12)}<span>${inv.patientAddress}</span></p>`:''}
        ${inv.patientMobile?`<a href="tel:${inv.patientMobile}" class="text-xs text-emerald-600 dark:text-emerald-400 hover:underline flex items-center gap-1.5 font-medium">${icS('phone',12)}<span>${inv.patientMobile}</span></a>`:''}
        ${inv.patientEmail?`<a href="mailto:${inv.patientEmail}" class="text-xs text-emerald-600 dark:text-emerald-400 hover:underline flex items-center gap-1.5 font-medium">${icS('mail',12)}<span>${inv.patientEmail}</span></a>`:''}
        <p class="text-[11px] text-slate-400 pt-1">${inv.items.length} item${inv.items.length>1?'s':''}</p>
      </div>
      <!-- Bottom Section: Icon Actions Only -->
      <div class="flex border-t border-gray-100 dark:border-slate-800">
        <button data-act="share-wa" data-id="${inv.id}" class="flex-1 flex items-center justify-center py-3 text-green-600 dark:text-green-400 hover:bg-green-50 dark:hover:bg-green-900/20 btn-tap transition-colors">${icS('wa',18)}</button>
        <button data-act="exp-pdf" data-id="${inv.id}" class="flex-1 flex items-center justify-center py-3 text-red-500 hover:bg-red-50 dark:hover:bg-red-900/20 btn-tap transition-colors border-l border-gray-100 dark:border-slate-800">${icS('pdf',18)}</button>
        <button data-act="exp-img" data-id="${inv.id}" class="flex-1 flex items-center justify-center py-3 text-violet-500 hover:bg-violet-50 dark:hover:bg-violet-900/20 btn-tap transition-colors border-l border-gray-100 dark:border-slate-800">${icS('img',18)}</button>
        <button data-act="edit-inv" data-id="${inv.id}" class="flex-1 flex items-center justify-center py-3 text-blue-500 hover:bg-blue-50 dark:hover:bg-blue-900/20 btn-tap transition-colors border-l border-gray-100 dark:border-slate-800">${icS('edit',18)}</button>
        <button data-act="del-inv" data-id="${inv.id}" class="flex-1 flex items-center justify-center py-3 text-slate-400 hover:bg-red-50 hover:text-red-500 btn-tap transition-colors border-l border-gray-100 dark:border-slate-800">${icS('trash',18)}</button>
      </div>
    </div>`}).join('')}</div>`}
  </main>`;
}

function renderBottomNav(){const isDash=S.tab==='dashboard';const isPat=S.tab==='patients';return`<nav class="fixed bottom-0 left-0 right-0 z-40 bg-white/90 dark:bg-slate-900/90 glass border-t border-gray-200 dark:border-slate-800 transition-colors" style="padding-bottom:env(safe-area-inset-bottom)"><div class="flex items-end justify-around h-16 max-w-xl mx-auto relative"><button data-tab="dashboard" class="flex flex-col items-center justify-center flex-1 h-full gap-0.5 btn-tap transition-colors ${isDash?'text-emerald-600 dark:text-emerald-400':'text-slate-400 dark:text-slate-500'}">${icS('dash',22)}<span class="text-[10px] font-semibold">Dashboard</span></button><div class="flex flex-col items-center justify-end flex-1 h-full"><button data-act="new-inv" class="ripple-host relative -top-5 w-14 h-14 rounded-full bg-emerald-600 hover:bg-emerald-700 text-white shadow-xl flex items-center justify-center border-4 border-white dark:border-slate-900 transition-transform active:scale-90 fab-glow">${icS('plus',28)}</button></div><button data-tab="patients" class="flex flex-col items-center justify-center flex-1 h-full gap-0.5 btn-tap transition-colors ${isPat?'text-emerald-600 dark:text-emerald-400':'text-slate-400 dark:text-slate-500'}">${icS('list',22)}<span class="text-[10px] font-semibold">Patients</span></button></div></nav>`}

// --- Invoice Form (Unified Table Scroll) ---
function renderInvoiceModal(){const ed=S.editId?S.invoices.find(i=>i.id===S.editId):null;const items=ed?ed.items:[{name:'',quantity:1,unitPrice:0}];return`<div class="fixed inset-0 z-50 flex flex-col bg-white dark:bg-slate-900 anim-slide-up" id="inv-modal"><div class="flex items-center justify-between h-14 px-4 border-b border-gray-100 dark:border-slate-800 flex-shrink-0"><h2 class="text-base font-bold text-slate-900 dark:text-white">${ed?'Edit Invoice':'New Invoice'}</h2><button data-act="close-inv" class="w-8 h-8 rounded-lg hover:bg-gray-100 dark:hover:bg-slate-800 flex items-center justify-center text-slate-400">${icS('x',20)}</button></div><div class="flex-1 overflow-y-auto"><div class="max-w-2xl mx-auto p-4 space-y-5"><section class="bg-gray-50 dark:bg-slate-800/50 rounded-2xl p-4"><h3 class="text-xs font-bold text-emerald-600 dark:text-emerald-400 uppercase tracking-wider mb-3 flex items-center gap-2">${icS('user',15)}Patient Information</h3><div class="grid grid-cols-1 sm:grid-cols-2 gap-3"><div><label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">Patient Name *</label><input id="i-pname" type="text" value="${ed?ed.patientName:''}" placeholder="Full name" class="w-full px-3 py-2 text-sm border border-gray-200 dark:border-slate-700 rounded-lg bg-white dark:bg-slate-800 dark:text-white"/></div><div><label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">Address</label><input id="i-paddr" type="text" value="${ed?ed.patientAddress||'':''}" placeholder="Address" class="w-full px-3 py-2 text-sm border border-gray-200 dark:border-slate-700 rounded-lg bg-white dark:bg-slate-800 dark:text-white"/></div><div><label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">Mobile Number</label><input id="i-pmob" type="text" value="${ed?ed.patientMobile||'':''}" placeholder="+880 1XXX-XXXXXX" class="w-full px-3 py-2 text-sm border border-gray-200 dark:border-slate-700 rounded-lg bg-white dark:bg-slate-800 dark:text-white"/></div><div><label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">Email Address</label><input id="i-pemail" type="email" value="${ed?ed.patientEmail||'':''}" placeholder="email@example.com" class="w-full px-3 py-2 text-sm border border-gray-200 dark:border-slate-700 rounded-lg bg-white dark:bg-slate-800 dark:text-white"/></div><div><label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">Reward Point</label><input id="i-reward" type="number" value="${ed?ed.rewardPoint||0:0}" min="0" class="w-full px-3 py-2 text-sm border border-gray-200 dark:border-slate-700 rounded-lg bg-white dark:bg-slate-800 dark:text-white"/></div></div></section><section class="bg-gray-50 dark:bg-slate-800/50 rounded-2xl p-4"><h3 class="text-xs font-bold text-emerald-600 dark:text-emerald-400 uppercase tracking-wider mb-3 flex items-center gap-2">${icS('note',15)}Invoice Details</h3><div class="grid grid-cols-1 sm:grid-cols-3 gap-3"><div><label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">Invoice No.</label><input id="i-invnum" type="text" value="${ed?ed.invoiceNumber:'INV-'+String(S.nextNum).padStart(4,'0')}" readonly class="w-full px-3 py-2 text-sm border border-gray-200 dark:border-slate-700 rounded-lg bg-gray-100 dark:bg-slate-700 text-slate-500 dark:text-slate-400 cursor-not-allowed"/></div><div><label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">Date</label><input id="i-date" type="date" value="${ed?ed.date:today()}" class="w-full px-3 py-2 text-sm border border-gray-200 dark:border-slate-700 rounded-lg bg-white dark:bg-slate-800 dark:text-white"/></div><div><label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">Time</label><input id="i-time" type="time" value="${ed?ed.time||'':nowTime()}" class="w-full px-3 py-2 text-sm border border-gray-200 dark:border-slate-700 rounded-lg bg-white dark:bg-slate-800 dark:text-white"/></div></div><div class="mt-3"><label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">Notes</label><textarea id="i-notes" rows="2" placeholder="Additional notes..." class="w-full px-3 py-2 text-sm border border-gray-200 dark:border-slate-700 rounded-lg bg-white dark:bg-slate-800 dark:text-white resize-none">${ed?ed.notes||'':''}</textarea></div></section><section class="bg-gray-50 dark:bg-slate-800/50 rounded-2xl p-4"><div class="flex items-center justify-between mb-3"><h3 class="text-xs font-bold text-emerald-600 dark:text-emerald-400 uppercase tracking-wider flex items-center gap-2">${icS('pill',15)}Products / Medicines</h3><button data-act="add-row" class="text-xs font-semibold text-emerald-600 dark:text-emerald-400 hover:text-emerald-700 flex items-center gap-1 btn-tap">${icS('plus',14)}Add</button></div><div class="overflow-x-auto -mx-4 px-4"><div class="min-w-[600px]"><div class="flex gap-2 mb-2 px-1 text-[9px] font-bold text-slate-400 uppercase"><div class="w-8 text-center">SL</div><div class="flex-1 min-w-[180px]">Name</div><div class="w-[70px] text-center">Qty</div><div class="w-[100px] text-right">Price</div><div class="w-[100px] text-right">Subtotal</div><div class="w-8"></div></div><div id="items-box" class="space-y-2">${items.map((it,i)=>rItemRow(it,i)).join('')}</div></div></div><button data-act="add-row" class="mt-3 w-full py-2.5 border-2 border-dashed border-gray-200 dark:border-slate-700 rounded-xl text-xs text-slate-400 hover:text-emerald-600 hover:border-emerald-300 transition-all btn-tap">${icS('plus',14)} Add Item</button></section><section class="bg-gray-50 dark:bg-slate-800/50 rounded-2xl p-4"><h3 class="text-xs font-bold text-emerald-600 dark:text-emerald-400 uppercase tracking-wider mb-3 flex items-center gap-2">${icS('steth',15)}Doctor Fee</h3><div class="max-w-xs"><label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">Doctor Visit Fee</label><input id="i-docfee" type="number" value="${ed?ed.doctorFee||0:0}" min="0" step="1" class="w-full px-3 py-2 text-sm border border-gray-200 dark:border-slate-700 rounded-lg bg-white dark:bg-slate-800 dark:text-white"/></div></section><section class="bg-emerald-50 dark:bg-emerald-900/20 rounded-2xl p-4 border border-emerald-100 dark:border-emerald-800/40"><h3 class="text-xs font-bold text-emerald-700 dark:text-emerald-400 uppercase tracking-wider mb-3">Invoice Summary</h3><div class="space-y-2 text-sm"><div class="flex justify-between"><span class="text-slate-500 dark:text-slate-400">Total Items</span><span id="sum-items" class="font-semibold text-slate-700 dark:text-slate-300">0</span></div><div class="flex justify-between"><span class="text-slate-500 dark:text-slate-400">Total Quantity</span><span id="sum-qty" class="font-semibold text-slate-700 dark:text-slate-300">0</span></div><div class="flex justify-between"><span class="text-slate-500 dark:text-slate-400">Products Subtotal</span><span id="sum-psub" class="font-semibold text-slate-700 dark:text-slate-300">${fc(0)}</span></div><div class="flex justify-between"><span class="text-slate-500 dark:text-slate-400">Doctor Fee</span><span id="sum-dfee" class="font-semibold text-slate-700 dark:text-slate-300">${fc(0)}</span></div><div class="flex justify-between items-center"><span class="text-slate-500 dark:text-slate-400">Discount (–)</span><input id="i-disc" type="number" value="${ed?ed.discount||0:0}" min="0" step="1" class="w-28 px-2 py-1 text-sm text-right border border-gray-200 dark:border-slate-700 rounded-lg bg-white dark:bg-slate-800 dark:text-white"/></div><div class="border-t border-emerald-200 dark:border-emerald-800/40 pt-2 flex justify-between"><span class="font-bold text-emerald-800 dark:text-emerald-300">TOTAL PAYABLE</span><span id="sum-total" class="text-lg font-black text-emerald-700 dark:text-emerald-400">${fc(0)}</span></div></div><div class="mt-3 pt-3 border-t border-emerald-200 dark:border-emerald-800/40 space-y-2 text-sm"><div class="flex justify-between items-center"><span class="text-slate-500 dark:text-slate-400">Cash / Payment Received</span><input id="i-cash" type="number" value="${ed?ed.cashReceived||0:0}" min="0" step="1" class="w-28 px-2 py-1 text-sm text-right border border-gray-200 dark:border-slate-700 rounded-lg bg-white dark:bg-slate-800 dark:text-white"/></div><div class="flex justify-between"><span class="text-slate-500 dark:text-slate-400">Total Paid</span><span id="sum-paid" class="font-semibold text-emerald-600 dark:text-emerald-400">${fc(0)}</span></div><div class="flex justify-between"><span class="text-slate-500 dark:text-slate-400">Due</span><span id="sum-due" class="font-semibold text-red-500">${fc(0)}</span></div></div></section><div class="grid grid-cols-2 gap-3 pb-6"><button data-act="save-inv" class="flex items-center justify-center gap-2 py-3.5 rounded-xl bg-emerald-600 hover:bg-emerald-700 text-white font-bold text-sm shadow-lg shadow-emerald-600/20 btn-tap transition-colors">${icS('save',18)}Save Invoice</button><button data-act="clear-inv" class="flex items-center justify-center gap-2 py-3.5 rounded-xl bg-slate-800 dark:bg-slate-700 hover:bg-slate-900 dark:hover:bg-slate-600 text-white font-bold text-sm btn-tap transition-colors">${icS('refresh',18)}Clear & New</button></div></div></div></div>`}

function rItemRow(item,idx){const sub=(item.quantity||0)*(item.unitPrice||0);return`<div class="item-row flex gap-2 items-center bg-white dark:bg-slate-800 rounded-lg p-2 border border-gray-100 dark:border-slate-700" data-idx="${idx}"><div class="w-8 text-center text-xs font-bold text-slate-400">${idx+1}</div><div class="flex-1 min-w-[180px]"><input type="text" data-f="name" value="${item.name||''}" placeholder="Medicine name" class="w-full px-2 py-1.5 text-sm border border-gray-200 dark:border-slate-600 rounded-md bg-gray-50 dark:bg-slate-700 dark:text-white dark:placeholder-slate-400"/></div><div class="w-[70px]"><input type="number" data-f="quantity" value="${item.quantity||1}" min="1" class="w-full px-2 py-1.5 text-sm border border-gray-200 dark:border-slate-600 rounded-md bg-gray-50 dark:bg-slate-700 dark:text-white text-center"/></div><div class="w-[100px]"><input type="number" data-f="unitPrice" value="${item.unitPrice||0}" min="0" step="0.01" class="w-full px-2 py-1.5 text-sm border border-gray-200 dark:border-slate-600 rounded-md bg-gray-50 dark:bg-slate-700 dark:text-white text-right"/></div><div class="w-[100px] flex items-center justify-end"><span class="rsub text-sm font-bold text-slate-700 dark:text-slate-300">${fc(sub)}</span></div><div class="w-8 flex items-center justify-center"><button data-act="rm-row" data-idx="${idx}" class="p-1 rounded text-slate-300 hover:text-red-500 transition-colors">${icS('x',14)}</button></div></div>`}

// --- View Invoice Modal (Beautiful Card, No Export Icons, With Edit) ---
function renderViewModal(){
  const inv=S.invoices.find(i=>i.id===S.viewInvId);if(!inv){S.viewInvId=null;render();return''}
  const due=Math.max(0,inv.totalPayable-(inv.cashReceived||0));const p=S.profile;
  return`<div class="fixed inset-0 z-50 flex flex-col bg-gray-50 dark:bg-slate-950 anim-fade">
    <div class="flex items-center justify-between h-14 px-4 border-b border-gray-100 dark:border-slate-800 bg-white dark:bg-slate-900 flex-shrink-0">
      <button data-act="close-view" class="flex items-center gap-2 text-sm font-medium text-slate-600 dark:text-slate-400 btn-tap">${icS('arrow',18)}Back</button>
      <button data-act="edit-inv" data-id="${inv.id}" class="flex items-center gap-2 px-4 py-1.5 rounded-lg bg-emerald-600 hover:bg-emerald-700 text-white text-xs font-semibold btn-tap">${icS('edit',14)}Edit</button>
    </div>
    <div class="flex-1 overflow-y-auto p-4 flex justify-center">
      <div class="w-full max-w-lg">
        <!-- Beautiful Detail Card -->
        <div class="bg-white dark:bg-slate-900 rounded-2xl shadow-xl border border-gray-100 dark:border-slate-800 overflow-hidden anim-scale">
          <!-- Header -->
          <div class="bg-emerald-600 dark:bg-emerald-700 p-5 text-white">
            <div class="flex justify-between items-start">
              <div><p class="text-xs opacity-80 uppercase tracking-wider">Invoice</p><p class="text-xl font-bold">${inv.invoiceNumber}</p></div>
              <div class="text-right"><p class="text-xs opacity-80">${fd(inv.date)}${inv.time?' at '+inv.time:''}</p><p class="text-2xl font-black mt-1">${fc(inv.totalPayable)}</p></div>
            </div>
          </div>
          <!-- Body -->
          <div class="p-5 space-y-4">
            <div class="grid grid-cols-2 gap-4">
              <div><p class="text-[10px] font-bold text-slate-400 uppercase mb-1">Patient</p><p class="text-sm font-semibold text-slate-800 dark:text-slate-200">${inv.patientName}</p></div>
              ${inv.patientMobile?`<div><p class="text-[10px] font-bold text-slate-400 uppercase mb-1">Mobile</p><a href="tel:${inv.patientMobile}" class="text-sm font-medium text-emerald-600 hover:underline">${inv.patientMobile}</a></div>`:''}
              ${inv.patientEmail?`<div><p class="text-[10px] font-bold text-slate-400 uppercase mb-1">Email</p><a href="mailto:${inv.patientEmail}" class="text-sm font-medium text-emerald-600 hover:underline truncate block">${inv.patientEmail}</a></div>`:''}
              ${inv.patientAddress?`<div><p class="text-[10px] font-bold text-slate-400 uppercase mb-1">Address</p><p class="text-sm text-slate-600 dark:text-slate-400">${inv.patientAddress}</p></div>`:''}
              ${inv.rewardPoint?`<div><p class="text-[10px] font-bold text-slate-400 uppercase mb-1">Reward Points</p><p class="text-sm font-semibold text-amber-600">${inv.rewardPoint} pts</p></div>`:''}
            </div>
            
            <div class="border-t border-gray-100 dark:border-slate-800 pt-4">
              <p class="text-[10px] font-bold text-slate-400 uppercase mb-2">Items (${inv.items.length})</p>
              <div class="space-y-2">${inv.items.map((it,i)=>`<div class="flex justify-between items-center text-sm"><div class="flex-1 min-w-0"><span class="text-slate-500 dark:text-slate-400 mr-2">${i+1}.</span><span class="font-medium text-slate-800 dark:text-slate-200">${it.name}</span></div><div class="flex items-center gap-3 flex-shrink-0 ml-4"><span class="text-slate-500 dark:text-slate-400">${it.quantity} x ${fc(it.unitPrice)}</span><span class="font-semibold text-slate-900 dark:text-white">${fc(it.quantity*it.unitPrice)}</span></div></div>`).join('')}</div>
            </div>

            <div class="border-t border-gray-100 dark:border-slate-800 pt-4 space-y-2 text-sm">
              <div class="flex justify-between"><span class="text-slate-500">Products Subtotal</span><span class="font-medium">${fc(inv.productsSubtotal)}</span></div>
              <div class="flex justify-between"><span class="text-slate-500">Doctor Fee</span><span class="font-medium">${fc(inv.doctorFee)}</span></div>
              ${inv.discount>0?`<div class="flex justify-between"><span class="text-slate-500">Discount</span><span class="font-medium text-red-500">-${fc(inv.discount)}</span></div>`:''}
              <div class="flex justify-between pt-2 border-t border-dashed border-gray-200 dark:border-slate-700"><span class="font-bold">Total Payable</span><span class="font-bold text-emerald-600">${fc(inv.totalPayable)}</span></div>
              <div class="flex justify-between"><span class="text-slate-500">Cash Received</span><span class="font-medium">${fc(inv.cashReceived||0)}</span></div>
              <div class="flex justify-between"><span class="text-slate-500">Due</span><span class="font-semibold ${due>0?'text-red-500':'text-emerald-600'}">${fc(due)}</span></div>
            </div>

            ${inv.notes?`<div class="border-t border-gray-100 dark:border-slate-800 pt-4"><p class="text-[10px] font-bold text-slate-400 uppercase mb-1">Notes</p><p class="text-sm text-slate-600 dark:text-slate-400">${inv.notes}</p></div>`:''}

            <div class="border-t border-gray-100 dark:border-slate-800 pt-4 flex justify-between items-end">
              <p class="text-xs text-slate-400">Thank you for your visit!</p>
              <div class="text-center">${p.signature?`<img src="${p.signature}" class="h-8 object-contain mb-1"/>`:`<div class="w-24 border-b border-slate-300 mb-1"></div>`}<p class="text-[11px] font-semibold text-slate-600 dark:text-slate-400">${p.doctorName}</p>${p.doctorDegree?`<p class="text-[9px] text-slate-400">${p.doctorDegree}</p>`:''}</div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>`}

// --- Invoice HTML Template for Export Only ---
function rInvHTML(inv){const p=S.profile;const due=Math.max(0,inv.totalPayable-(inv.cashReceived||0));return`<div style="padding:32px;font-family:'Inter',sans-serif;color:#1e293b;"><div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:24px;"><div style="display:flex;align-items:center;gap:14px;">${p.logo?`<img src="${p.logo}" style="width:52px;height:52px;border-radius:12px;object-fit:cover"/>`:`<div style="width:52px;height:52px;border-radius:12px;background:#059669;display:flex;align-items:center;justify-content:center;color:white;font-weight:900;font-size:20px;">M</div>`}<div><h2 style="font-size:16px;font-weight:800;margin:0;color:#0f172a;">${p.chamberName||'Chamber'}</h2><p style="font-size:11px;color:#64748b;margin:2px 0 0;">${p.address||''}</p><p style="font-size:11px;color:#64748b;margin:0;">${p.phone||''} ${p.email?'| '+p.email:''}</p></div></div><div style="text-align:right;"><h1 style="font-size:24px;font-weight:900;letter-spacing:-1px;color:#0f172a;margin:0;">INVOICE</h1><p style="font-size:13px;font-weight:700;color:#059669;margin:4px 0 0;">${inv.invoiceNumber}</p><p style="font-size:11px;color:#94a3b8;margin:2px 0 0;">${fd(inv.date)}${inv.time?' at '+inv.time:''}</p></div></div><div style="background:#f8fafc;border-radius:10px;padding:14px;margin-bottom:20px;display:flex;flex-wrap:wrap;gap:16px;"><div><p style="font-size:9px;font-weight:700;color:#94a3b8;text-transform:uppercase;margin:0 0 3px;">Patient</p><p style="font-size:14px;font-weight:700;color:#1e293b;margin:0;">${inv.patientName||'—'}</p></div>${inv.patientMobile?`<div><p style="font-size:9px;font-weight:700;color:#94a3b8;text-transform:uppercase;margin:0 0 3px;">Mobile</p><p style="font-size:13px;color:#475569;margin:0;">${inv.patientMobile}</p></div>`:''}${inv.patientEmail?`<div><p style="font-size:9px;font-weight:700;color:#94a3b8;text-transform:uppercase;margin:0 0 3px;">Email</p><p style="font-size:13px;color:#475569;margin:0;">${inv.patientEmail}</p></div>`:''}${inv.patientAddress?`<div><p style="font-size:9px;font-weight:700;color:#94a3b8;text-transform:uppercase;margin:0 0 3px;">Address</p><p style="font-size:13px;color:#475569;margin:0;">${inv.patientAddress}</p></div>`:''}</div><table style="width:100%;border-collapse:collapse;margin-bottom:16px;"><thead><tr style="border-bottom:2px solid #e2e8f0;"><th style="text-align:left;font-size:9px;font-weight:700;color:#94a3b8;text-transform:uppercase;padding:0 6px 6px 0;">SL</th><th style="text-align:left;font-size:9px;font-weight:700;color:#94a3b8;text-transform:uppercase;padding:0 6px 6px 0;">Product / Medicine</th><th style="text-align:center;font-size:9px;font-weight:700;color:#94a3b8;text-transform:uppercase;padding:0 6px 6px 0;">Qty</th><th style="text-align:right;font-size:9px;font-weight:700;color:#94a3b8;text-transform:uppercase;padding:0 6px 6px 0;">Unit Price</th><th style="text-align:right;font-size:9px;font-weight:700;color:#94a3b8;text-transform:uppercase;padding:0 0 6px;">Subtotal</th></tr></thead><tbody>${inv.items.map((it,i)=>`<tr style="border-bottom:1px solid #f1f5f9;"><td style="padding:8px 6px 8px 0;font-size:12px;color:#94a3b8;">${i+1}</td><td style="padding:8px 6px;font-size:13px;font-weight:600;color:#1e293b;">${it.name||'—'}</td><td style="padding:8px 6px;font-size:13px;color:#475569;text-align:center;">${it.quantity}</td><td style="padding:8px 6px;font-size:13px;color:#475569;text-align:right;">${fc(it.unitPrice)}</td><td style="padding:8px 0;font-size:13px;font-weight:700;color:#1e293b;text-align:right;">${fc(it.quantity*it.unitPrice)}</td></tr>`).join('')}</tbody></table><div style="display:flex;justify-content:flex-end;margin-bottom:20px;"><div style="width:260px;"><div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:6px;"><span style="color:#64748b;">Products Subtotal</span><span style="font-weight:600;color:#334155;">${fc(inv.productsSubtotal)}</span></div><div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:6px;"><span style="color:#64748b;">Doctor Fee</span><span style="font-weight:600;color:#334155;">${fc(inv.doctorFee)}</span></div>${inv.discount>0?`<div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:6px;"><span style="color:#64748b;">Discount</span><span style="font-weight:600;color:#ef4444;">-${fc(inv.discount)}</span></div>`:''}<div style="border-top:2px solid #e2e8f0;padding-top:6px;display:flex;justify-content:space-between;"><span style="font-size:15px;font-weight:800;color:#0f172a;">TOTAL PAYABLE</span><span style="font-size:17px;font-weight:900;color:#059669;">${fc(inv.totalPayable)}</span></div><div style="margin-top:8px;padding-top:8px;border-top:1px dashed #e2e8f0;"><div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px;"><span style="color:#64748b;">Cash Received</span><span style="font-weight:600;color:#334155;">${fc(inv.cashReceived||0)}</span></div><div style="display:flex;justify-content:space-between;font-size:12px;"><span style="color:#64748b;">Due</span><span style="font-weight:700;color:${due>0?'#ef4444':'#059669'}">${fc(due)}</span></div></div></div></div>${inv.notes?`<div style="background:#f8fafc;border-radius:8px;padding:10px;margin-bottom:16px;"><p style="font-size:9px;font-weight:700;color:#94a3b8;text-transform:uppercase;margin:0 0 3px;">Notes</p><p style="font-size:12px;color:#475569;margin:0;">${inv.notes}</p></div>`:''}<div style="display:flex;justify-content:space-between;align-items:flex-end;border-top:1px solid #e2e8f0;padding-top:16px;"><div><p style="font-size:11px;color:#94a3b8;margin:0;">Thank you for your visit!</p><p style="font-size:9px;color:#cbd5e1;margin:3px 0 0;">Generated by ${p.appName||'MedBill Pro'}</p></div><div style="text-align:center;">${p.signature?`<img src="${p.signature}" style="height:40px;margin-bottom:4px;object-fit:contain"/>`:`<div style="width:140px;border-bottom:1px solid #94a3b8;margin-bottom:4px;"></div>`}<p style="font-size:11px;font-weight:600;color:#64748b;margin:0;">${p.doctorName||''}</p>${p.doctorDegree?`<p style="font-size:9px;color:#94a3b8;margin:1px 0 0;">${p.doctorDegree}</p>`:''}</div></div></div>`}

// --- Settings Modal ---
function renderSettingsModal(){const p=S.profile;const fields=[{key:'appName',label:'App Name',val:p.appName,icon:'gear'},{key:'chamberName',label:'Chamber / Pharmacy Name',val:p.chamberName,icon:'map'},{key:'address',label:'Address',val:p.address,icon:'map'},{key:'phone',label:'Phone Number',val:p.phone,icon:'phone'},{key:'email',label:'Email',val:p.email,icon:'mail'},{key:'doctorName',label:'Doctor Name',val:p.doctorName,icon:'user'},{key:'doctorDegree',label:'Doctor Degree',val:p.doctorDegree,icon:'award'},{key:'currency',label:'Currency Code',val:p.currency,icon:'dollar'},{key:'sym',label:'Currency Symbol',val:p.sym,icon:'dollar'}];return`<div class="fixed inset-0 z-50 flex flex-col sm:flex-row bg-white dark:bg-slate-900 anim-slide-up" id="settings-modal"><div class="hidden sm:flex flex-col w-64 bg-gray-50 dark:bg-slate-800 border-r border-gray-100 dark:border-slate-700 p-4 flex-shrink-0"><div class="flex items-center justify-between mb-6"><h2 class="text-base font-bold text-slate-900 dark:text-white">Settings</h2><button data-act="close-settings" class="w-8 h-8 rounded-lg hover:bg-gray-200 dark:hover:bg-slate-700 flex items-center justify-center text-slate-400">${icS('x',18)}</button></div><nav class="space-y-1"><button data-act="stab" data-stab="profile" class="w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium transition-all ${S.settingsTab==='profile'?'bg-emerald-50 dark:bg-emerald-900/30 text-emerald-600 dark:text-emerald-400':'text-slate-600 dark:text-slate-400 hover:bg-gray-100 dark:hover:bg-slate-700'}">${icS('steth',16)}Profile</button><button data-act="stab" data-stab="data" class="w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium transition-all ${S.settingsTab==='data'?'bg-emerald-50 dark:bg-emerald-900/30 text-emerald-600 dark:text-emerald-400':'text-slate-600 dark:text-slate-400 hover:bg-gray-100 dark:hover:bg-slate-700'}">${icS('dl',16)}Data</button><button data-act="stab" data-stab="theme" class="w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium transition-all ${S.settingsTab==='theme'?'bg-emerald-50 dark:bg-emerald-900/30 text-emerald-600 dark:text-emerald-400':'text-slate-600 dark:text-slate-400 hover:bg-gray-100 dark:hover:bg-slate-700'}">${icS('system',16)}Theme</button></nav></div><div class="sm:hidden flex items-center justify-between h-14 px-4 border-b border-gray-100 dark:border-slate-800 flex-shrink-0"><h2 class="text-base font-bold text-slate-900 dark:text-white">Settings</h2><button data-act="close-settings" class="w-8 h-8 rounded-lg hover:bg-gray-100 dark:hover:bg-slate-800 flex items-center justify-center text-slate-400">${icS('x',18)}</button></div><div class="sm:hidden flex border-b border-gray-100 dark:border-slate-800"><button data-act="stab" data-stab="profile" class="flex-1 py-2.5 text-xs font-semibold text-center ${S.settingsTab==='profile'?'text-emerald-600 border-b-2 border-emerald-600':'text-slate-400'}">Profile</button><button data-act="stab" data-stab="data" class="flex-1 py-2.5 text-xs font-semibold text-center ${S.settingsTab==='data'?'text-emerald-600 border-b-2 border-emerald-600':'text-slate-400'}">Data</button><button data-act="stab" data-stab="theme" class="flex-1 py-2.5 text-xs font-semibold text-center ${S.settingsTab==='theme'?'text-emerald-600 border-b-2 border-emerald-600':'text-slate-400'}">Theme</button></div><div class="flex-1 overflow-y-auto p-4 sm:p-6"><div class="max-w-xl mx-auto">${S.settingsTab==='profile'?`<div class="grid grid-cols-2 gap-4 mb-6"><div class="bg-gray-50 dark:bg-slate-800/50 rounded-2xl p-4 text-center border border-gray-100 dark:border-slate-700"><p class="text-[10px] font-bold text-slate-400 uppercase mb-2">Logo</p>${p.logo?`<img src="${p.logo}" class="w-16 h-16 rounded-xl object-cover mx-auto mb-2 border border-gray-200 dark:border-slate-600"/>`:``}<div class="flex gap-2 justify-center"><button data-act="upload-logo" class="text-xs font-semibold text-emerald-600 hover:text-emerald-700">Upload</button>${p.logo?`<button data-act="rm-logo" class="text-xs font-semibold text-red-500">Remove</button>`:''}</div></div><div class="bg-gray-50 dark:bg-slate-800/50 rounded-2xl p-4 text-center border border-gray-100 dark:border-slate-700"><p class="text-[10px] font-bold text-slate-400 uppercase mb-2">Signature</p>${p.signature?`<img src="${p.signature}" class="h-12 object-contain mx-auto mb-2"/>`:``}<div class="flex gap-2 justify-center"><button data-act="upload-sig" class="text-xs font-semibold text-emerald-600 hover:text-emerald-700">Upload</button>${p.signature?`<button data-act="rm-sig" class="text-xs font-semibold text-red-500">Remove</button>`:''}</div></div></div><div class="space-y-1">${fields.map(f=>`<div class="flex items-center justify-between py-3 px-4 rounded-xl hover:bg-gray-50 dark:hover:bg-slate-800/50 transition-colors group" data-field="${f.key}"><div class="flex items-center gap-3 flex-1 min-w-0"><span class="text-slate-400 dark:text-slate-500">${icS(f.icon,16)}</span><div class="min-w-0 flex-1"><p class="text-[10px] font-bold text-slate-400 uppercase">${f.label}</p><p class="text-sm font-medium text-slate-800 dark:text-slate-200 truncate field-display">${f.val||'—'}</p><input type="text" class="hidden w-full px-2 py-1 text-sm border border-gray-200 dark:border-slate-600 rounded-lg bg-white dark:bg-slate-800 dark:text-white field-input" value="${(f.val||'').replace(/"/g,'&quot;')}"/></div></div><button class="field-edit-btn w-8 h-8 rounded-lg hover:bg-emerald-50 dark:hover:bg-emerald-900/30 flex items-center justify-center text-slate-300 group-hover:text-emerald-500 transition-colors btn-tap" data-act="edit-field" data-key="${f.key}">${icS('edit',14)}</button></div>`).join('')}</div>`:S.settingsTab==='data'?`<div class="space-y-3"><h3 class="text-sm font-bold text-slate-900 dark:text-white mb-2">Export Data</h3><button data-act="exp-json" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl border border-gray-200 dark:border-slate-700 hover:bg-gray-50 dark:hover:bg-slate-800 text-slate-700 dark:text-slate-300 text-sm font-medium btn-tap">${icS('dl',16)}Export JSON</button><button data-act="exp-xls" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl border border-gray-200 dark:border-slate-700 hover:bg-gray-50 dark:hover:bg-slate-800 text-slate-700 dark:text-slate-300 text-sm font-medium btn-tap">${icS('xls',16)}Export Excel</button><button data-act="exp-csv" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl border border-gray-200 dark:border-slate-700 hover:bg-gray-50 dark:hover:bg-slate-800 text-slate-700 dark:text-slate-300 text-sm font-medium btn-tap">${icS('note',16)}Export CSV</button><div class="border-t border-gray-100 dark:border-slate-800 my-4"></div><h3 class="text-sm font-bold text-slate-900 dark:text-white mb-2">Import Data</h3><button data-act="imp-json" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl border border-gray-200 dark:border-slate-700 hover:bg-gray-50 dark:hover:bg-slate-800 text-slate-700 dark:text-slate-300 text-sm font-medium btn-tap">${icS('ul',16)}Import JSON File</button><div class="border-t border-gray-100 dark:border-slate-800 my-4"></div><h3 class="text-sm font-bold text-red-600 mb-2">Danger Zone</h3><button data-act="clear-all" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl border border-red-200 dark:border-red-900/50 hover:bg-red-50 dark:hover:bg-red-900/20 text-red-600 text-sm font-medium btn-tap">${icS('trash',16)}Clear All Data</button></div>`:`<div class="space-y-3"><h3 class="text-sm font-bold text-slate-900 dark:text-white mb-4">Appearance</h3><button data-act="set-theme" data-t="light" class="w-full flex items-center gap-4 px-4 py-3.5 rounded-xl border ${S.theme==='light'?'border-emerald-300 bg-emerald-50 dark:bg-emerald-900/20':'border-gray-200 dark:border-slate-700 hover:bg-gray-50 dark:hover:bg-slate-800'} transition-colors btn-tap"><span class="w-10 h-10 rounded-xl bg-amber-100 dark:bg-amber-900/40 text-amber-600 flex items-center justify-center">${icS('sun',20)}</span><div class="text-left"><p class="text-sm font-semibold ${S.theme==='light'?'text-emerald-700 dark:text-emerald-400':'text-slate-700 dark:text-slate-300'}">Light Mode</p><p class="text-xs text-slate-400">Bright and clean</p></div>${S.theme==='light'?`<span class="ml-auto text-emerald-600">${icS('chk',18)}</span>`:''}</button><button data-act="set-theme" data-t="dark" class="w-full flex items-center gap-4 px-4 py-3.5 rounded-xl border ${S.theme==='dark'?'border-emerald-300 bg-emerald-50 dark:bg-emerald-900/20':'border-gray-200 dark:border-slate-700 hover:bg-gray-50 dark:hover:bg-slate-800'} transition-colors btn-tap"><span class="w-10 h-10 rounded-xl bg-slate-800 text-slate-300 flex items-center justify-center">${icS('moon',20)}</span><div class="text-left"><p class="text-sm font-semibold ${S.theme==='dark'?'text-emerald-700 dark:text-emerald-400':'text-slate-700 dark:text-slate-300'}">Dark Mode</p><p class="text-xs text-slate-400">Easy on the eyes</p></div>${S.theme==='dark'?`<span class="ml-auto text-emerald-600">${icS('chk',18)}</span>`:''}</button><button data-act="set-theme" data-t="system" class="w-full flex items-center gap-4 px-4 py-3.5 rounded-xl border ${S.theme==='system'?'border-emerald-300 bg-emerald-50 dark:bg-emerald-900/20':'border-gray-200 dark:border-slate-700 hover:bg-gray-50 dark:hover:bg-slate-800'} transition-colors btn-tap"><span class="w-10 h-10 rounded-xl bg-violet-100 dark:bg-violet-900/40 text-violet-600 flex items-center justify-center">${icS('system',20)}</span><div class="text-left"><p class="text-sm font-semibold ${S.theme==='system'?'text-emerald-700 dark:text-emerald-400':'text-slate-700 dark:text-slate-300'}">System</p><p class="text-xs text-slate-400">Follow device settings</p></div>${S.theme==='system'?`<span class="ml-auto text-emerald-600">${icS('chk',18)}</span>`:''}</button></div>`}</div></div></div>`}

function getFormItems(){const rows=document.querySelectorAll('#items-box .item-row');const items=[];rows.forEach(r=>{items.push({name:r.querySelector('[data-f="name"]')?.value||'',quantity:parseInt(r.querySelector('[data-f="quantity"]')?.value)||0,unitPrice:parseFloat(r.querySelector('[data-f="unitPrice"]')?.value)||0})});return items}
function recalc(){const items=getFormItems();const docFee=parseFloat(document.getElementById('i-docfee')?.value)||0;const disc=parseFloat(document.getElementById('i-disc')?.value)||0;const cash=parseFloat(document.getElementById('i-cash')?.value)||0;const sum=calcSummary(items,docFee,disc);const due=Math.max(0,sum.totalPayable-cash);const rows=document.querySelectorAll('#items-box .item-row');rows.forEach(r=>{const q=parseFloat(r.querySelector('[data-f="quantity"]')?.value)||0;const p=parseFloat(r.querySelector('[data-f="unitPrice"]')?.value)||0;const sub=r.querySelector('.rsub');if(sub)sub.textContent=fc(q*p)});const el=id=>document.getElementById(id);if(el('sum-items'))el('sum-items').textContent=sum.totalItems;if(el('sum-qty'))el('sum-qty').textContent=sum.totalQty;if(el('sum-psub'))el('sum-psub').textContent=fc(sum.productsSubtotal);if(el('sum-dfee'))el('sum-dfee').textContent=fc(sum.doctorFee);if(el('sum-total'))el('sum-total').textContent=fc(sum.totalPayable);if(el('sum-paid'))el('sum-paid').textContent=fc(cash);if(el('sum-due'))el('sum-due').textContent=fc(due)}

document.addEventListener('click',function(e){
  const rippleHost=e.target.closest('.ripple-host');if(rippleHost){const circle=document.createElement('span');circle.className='ripple-circle';const rect=rippleHost.getBoundingClientRect();const size=Math.max(rect.width,rect.height);circle.style.width=circle.style.height=size+'px';circle.style.left=(e.clientX-rect.left-size/2)+'px';circle.style.top=(e.clientY-rect.top-size/2)+'px';rippleHost.appendChild(circle);setTimeout(()=>circle.remove(),600)}
  const nav=e.target.closest('[data-tab]');const act=e.target.closest('[data-act]');
  if(nav){e.preventDefault();S.tab=nav.dataset.tab;saveS();render();return}
  if(!act)return;const a=act.dataset.act;const id=act.dataset.id;
  switch(a){
    case 'new-inv':S.editId=null;S.showInvoice=true;render();break;
    case 'close-inv':S.showInvoice=false;S.editId=null;render();break;
    case 'close-view':S.viewInvId=null;render();break;
    case 'open-settings':S.showSettings=true;render();break;
    case 'close-settings':S.showSettings=false;render();break;
    case 'stab':S.settingsTab=act.dataset.stab;render();break;
    case 'toggle-theme':if(S.theme==='light')setTheme('dark');else if(S.theme==='dark')setTheme('system');else setTheme('light');break;
    case 'set-theme':setTheme(act.dataset.t);render();break;
    case 'add-row':{const box=document.getElementById('items-box');if(!box)return;const cur=getFormItems();cur.push({name:'',quantity:1,unitPrice:0});box.insertAdjacentHTML('beforeend',rItemRow({name:'',quantity:1,unitPrice:0},cur.length-1));recalc();break}
    case 'rm-row':{const box=document.getElementById('items-box');if(!box)return;const rows=box.querySelectorAll('.item-row');if(rows.length<=1){toast('At least one item required','warning');return}const idx=parseInt(act.dataset.idx);rows[idx]?.remove();box.querySelectorAll('.item-row').forEach((r,i)=>{r.dataset.idx=i;const rb=r.querySelector('[data-act="rm-row"]');if(rb)rb.dataset.idx=i;r.querySelector('span').textContent=i+1});recalc();break}
    case 'save-inv':{
      const pn=document.getElementById('i-pname')?.value.trim();if(!pn){toast('Patient name is required','error');document.getElementById('i-pname')?.focus();return}
      const items=getFormItems().filter(i=>i.name.trim());if(!items.length){toast('Add at least one medicine/item','error');return}
      const docFee=parseFloat(document.getElementById('i-docfee')?.value)||0;const disc=parseFloat(document.getElementById('i-disc')?.value)||0;const cash=parseFloat(document.getElementById('i-cash')?.value)||0;const sum=calcSummary(items,docFee,disc);
      const inv={id:S.editId||gid(),invoiceNumber:document.getElementById('i-invnum')?.value||'INV-'+S.nextNum,date:document.getElementById('i-date')?.value||today(),time:document.getElementById('i-time')?.value||nowTime(),notes:document.getElementById('i-notes')?.value.trim()||'',patientName:pn,patientAddress:document.getElementById('i-paddr')?.value.trim()||'',patientMobile:document.getElementById('i-pmob')?.value.trim()||'',patientEmail:document.getElementById('i-pemail')?.value.trim()||'',rewardPoint:parseInt(document.getElementById('i-reward')?.value)||0,items,doctorFee:docFee,discount:disc,cashReceived:cash,...sum,createdAt:S.editId?(S.invoices.find(i=>i.id===S.editId)?.createdAt||new Date().toISOString()):new Date().toISOString()};
      if(S.editId){const idx=S.invoices.findIndex(i=>i.id===S.editId);if(idx!==-1)S.invoices[idx]=inv;S.editId=null;toast('Invoice updated','success')}else{S.invoices.push(inv);S.nextNum++;toast('Invoice saved','success')}
      S.showInvoice=false;S.viewInvId=inv.id;saveS();render();break}
    case 'clear-inv':{S.editId=null;S.showInvoice=false;saveS();setTimeout(()=>{S.showInvoice=true;render()},50);break}
    case 'edit-inv':S.editId=id;S.showInvoice=true;S.viewInvId=null;render();break;
    case 'view-inv':S.viewInvId=id;render();break;
    case 'del-inv':confirm2('Delete this invoice permanently?',()=>{S.invoices=S.invoices.filter(i=>i.id!==id);saveS();toast('Invoice deleted','info');if(S.viewInvId===id)S.viewInvId=null;render()});break;
    case 'share-wa':shareWA(id);break;
    case 'exp-pdf':expPDF(id);break;
    case 'exp-img':expImg(id);break;
    case 'edit-field':{const key=act.dataset.key;const container=act.closest('[data-field]');const display=container.querySelector('.field-display');const input=container.querySelector('.field-input');if(input.classList.contains('hidden')){input.classList.remove('hidden');display.classList.add('hidden');input.focus();act.innerHTML=icS('chk',14)}else{S.profile[key]=input.value.trim();saveS();display.textContent=input.value.trim()||'—';input.classList.add('hidden');display.classList.remove('hidden');act.innerHTML=icS('edit',14);toast('Updated','success')}break}
    case 'upload-logo':document.getElementById('f-logo')?.click();break;
    case 'rm-logo':S.profile.logo=null;saveS();toast('Logo removed','info');render();break;
    case 'upload-sig':document.getElementById('f-sig')?.click();break;
    case 'rm-sig':S.profile.signature=null;saveS();toast('Signature removed','info');render();break;
    case 'exp-json':expAllJSON();break;case 'exp-xls':expAllXLS();break;case 'exp-csv':expAllCSV();break;case 'imp-json':document.getElementById('f-json')?.click();break;
    case 'clear-all':confirm2('This will permanently delete ALL data. Continue?',()=>{S.invoices=[];S.nextNum=1001;saveS();toast('All data cleared','info');render()});break;
  }
});

document.addEventListener('input',function(e){if(e.target.closest('#items-box')&&e.target.matches('[data-f]'))recalc();if(e.target.id==='i-docfee')recalc();if(e.target.id==='i-disc')recalc();if(e.target.id==='i-cash')recalc();if(e.target.id==='p-search'){S.search=e.target.value;const m=document.querySelector('.pb-24');if(m)m.innerHTML=renderContent()+renderBottomNav()}});
document.addEventListener('change',function(e){if(e.target.id==='p-filter'){S.filter=e.target.value;const m=document.querySelector('.pb-24');if(m)m.innerHTML=renderContent()+renderBottomNav()}});

document.getElementById('f-logo').addEventListener('change',function(e){const f=e.target.files?.[0];if(!f)return;if(f.size>2*1024*1024){toast('Max 2MB','error');return}const r=new FileReader();r.onload=ev=>{S.profile.logo=ev.target.result;saveS();toast('Logo uploaded','success');render()};r.readAsDataURL(f);e.target.value=''});
document.getElementById('f-sig').addEventListener('change',function(e){const f=e.target.files?.[0];if(!f)return;if(f.size>2*1024*1024){toast('Max 2MB','error');return}const r=new FileReader();r.onload=ev=>{S.profile.signature=ev.target.result;saveS();toast('Signature uploaded','success');render()};r.readAsDataURL(f);e.target.value=''});
document.getElementById('f-json').addEventListener('change',function(e){const f=e.target.files?.[0];if(!f)return;const r=new FileReader();r.onload=ev=>{try{const d=JSON.parse(ev.target.result);const invs=Array.isArray(d)?d:(d.invoices||[]);let c=0;invs.forEach(inv=>{if(inv.id&&inv.invoiceNumber&&inv.patientName&&!S.invoices.find(i=>i.id===inv.id)){S.invoices.push(inv);c++}});const mx=S.invoices.reduce((m,i)=>{const n=parseInt(i.invoiceNumber?.replace(/\D/g,''))||0;return n>m?n:m},S.nextNum);S.nextNum=mx+1;saveS();toast(`Imported ${c} invoice${c!==1?'s':''}`,'success');render()}catch(err){toast('Invalid JSON file','error')}};r.readAsText(f);e.target.value=''});

function shareWA(id){const inv=S.invoices.find(i=>i.id===id);if(!inv)return;const p=S.profile;const ph=inv.patientMobile?inv.patientMobile.replace(/[^0-9+]/g,''):'';const msg=encodeURIComponent(`Hello ${inv.patientName}, thank you for visiting ${p.chamberName||'our chamber'}. Your invoice ${inv.invoiceNumber} for ${p.currency} ${inv.totalPayable.toFixed(2)} is ready. Regards, ${p.doctorName||'Doctor'}.`);window.open(ph?`https://wa.me/${ph.replace('+','')}?text=${msg}`:`https://wa.me/?text=${msg}`,'_blank');toast('Opening WhatsApp...','success')}

// Fixed PDF Export - No background bleed, smaller file size
function expPDF(id){const inv=S.invoices.find(i=>i.id===id);if(!inv)return;toast('Generating PDF...','info');const box=document.getElementById('inv-export');box.innerHTML=rInvHTML(inv);setTimeout(()=>{html2canvas(box,{scale:1.5,useCORS:true,backgroundColor:'#ffffff',logging:false}).then(canvas=>{const{jsPDF}=window.jspdf;const pdf=new jsPDF('p','mm','a4');const iw=210;const ih=(canvas.height*iw)/canvas.width;const imgData=canvas.toDataURL('image/jpeg',0.75);pdf.addImage(imgData,'JPEG',0,0,iw,ih);pdf.save(inv.invoiceNumber+'.pdf');box.innerHTML='';toast('PDF downloaded','success')}).catch(()=>{box.innerHTML='';toast('PDF failed','error')})},300)}

function expImg(id){const inv=S.invoices.find(i=>i.id===id);if(!inv)return;toast('Generating image...','info');const box=document.getElementById('inv-export');box.innerHTML=rInvHTML(inv);setTimeout(()=>{html2canvas(box,{scale:2,useCORS:true,backgroundColor:'#ffffff'}).then(canvas=>{const a=document.createElement('a');a.download=inv.invoiceNumber+'.png';a.href=canvas.toDataURL('image/png');a.click();box.innerHTML='';toast('Image downloaded','success')}).catch(()=>{box.innerHTML='';toast('Image failed','error')})},300)}
function expAllJSON(){if(!S.invoices.length){toast('No data','warning');return}const d=JSON.stringify(S.invoices,null,2);const b=new Blob([d],{type:'application/json'});const a=document.createElement('a');a.download='medbill_'+today()+'.json';a.href=URL.createObjectURL(b);a.click();URL.revokeObjectURL(a.href);toast('JSON exported','success')}
function expAllXLS(){if(!S.invoices.length){toast('No data','warning');return}try{const rows=S.invoices.map(i=>({'Invoice #':i.invoiceNumber,Date:i.date,Time:i.time||'',Patient:i.patientName,Mobile:i.patientMobile||'','Total Payable':i.totalPayable}));const ws=XLSX.utils.json_to_sheet(rows);const wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,ws,'Invoices');XLSX.writeFile(wb,'medbill_'+today()+'.xlsx');toast('Excel exported','success')}catch(e){toast('Export failed','error')}}
function expAllCSV(){if(!S.invoices.length){toast('No data','warning');return}try{const hdr=['Invoice#','Date','Patient','Mobile','TotalPayable'];const rows=S.invoices.map(i=>[i.invoiceNumber,i.date,i.patientName,i.patientMobile||'',i.totalPayable]);const csv=[hdr,...rows].map(r=>r.map(c=>'"'+String(c).replace(/"/g,'""')+'"').join(',')).join('\n');const b=new Blob([csv],{type:'text/csv'});const a=document.createElement('a');a.download='medbill_'+today()+'.csv';a.href=URL.createObjectURL(b);a.click();URL.revokeObjectURL(a.href);toast('CSV exported','success')}catch(e){toast('Export failed','error')}}

render();
</script>
