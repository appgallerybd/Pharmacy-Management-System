<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MedBill Pro — Invoice System</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config={theme:{extend:{fontFamily:{sans:['Inter','system-ui','sans-serif']}}}}
</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{--sb:260px}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:#f8fafc;color:#1e293b}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:4px}
::-webkit-scrollbar-track{background:transparent}

@keyframes vIn{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes cIn{from{opacity:0;transform:translateY(16px) scale(.97)}to{opacity:1;transform:translateY(0) scale(1)}}
@keyframes tIn{from{opacity:0;transform:translateX(80px)}to{opacity:1;transform:translateX(0)}}
@keyframes tOut{from{opacity:1;transform:translateX(0)}to{opacity:0;transform:translateX(80px)}}
@keyframes mIn{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
@keyframes rOut{to{opacity:0;transform:translateX(-20px);height:0;margin:0;padding:0;overflow:hidden}}

.v-enter{animation:vIn .35s cubic-bezier(.16,1,.3,1) forwards}
.c-enter{animation:cIn .4s cubic-bezier(.16,1,.3,1) forwards;opacity:0}
.t-enter{animation:tIn .4s cubic-bezier(.16,1,.3,1) forwards}
.t-exit{animation:tOut .3s ease forwards}
.m-enter{animation:mIn .3s cubic-bezier(.16,1,.3,1) forwards}
.pulse-dot{animation:pulse 2s ease-in-out infinite}
.r-exit{animation:rOut .25s ease forwards}

.btn-p:active{transform:scale(.96);transition:transform .1s}
input:focus,select:focus,textarea:focus{outline:none;box-shadow:0 0 0 3px rgba(5,150,105,.15);border-color:#059669!important}

#sidebar{transition:transform .3s cubic-bezier(.16,1,.3,1)}
#sb-overlay{transition:opacity .3s ease}

@media print{body *{visibility:hidden}#inv-export,#inv-export *{visibility:visible}#inv-export{position:absolute;left:0;top:0}}
</style>
</head>
<body>
<div id="app" class="flex min-h-screen"></div>
<div id="toasts" class="fixed top-5 right-5 z-[200] flex flex-col gap-3 pointer-events-none"></div>
<div id="inv-export" style="position:fixed;left:-9999px;top:0;z-index:-1;width:800px;background:#fff"></div>
<input type="file" id="f-json" accept=".json" class="hidden">
<input type="file" id="f-logo" accept="image/*" class="hidden">

// --- State ---
const SK='medbill_pro_v2';
function defState(){return{view:'dashboard',invoices:[],profile:{chamberName:'HealthFirst Medical Chamber',address:'123 Medical Plaza, Dhanmondi, Dhaka 1205',contact:'+880 1712-345678',doctorName:'Dr. Aminul Haque',logo:null,currency:'BDT',sym:'৳'},nextNum:1001,editId:null,search:'',filter:'all',sort:'date-desc',sbOpen:false,detailId:null}}
let S=loadS();
function loadS(){try{const d=localStorage.getItem(SK);if(d)return{...defState(),...JSON.parse(d)}}catch(e){}return defState()}
function saveS(){try{localStorage.setItem(SK,JSON.stringify(S))}catch(e){}}

// --- Utils ---
function gid(){return'inv_'+Date.now().toString(36)+Math.random().toString(36).substr(2,5)}
function fc(a){return S.profile.sym+' '+Number(a||0).toFixed(2)}
function fd(d){if(!d)return'—';return new Date(d).toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'})}
function today(){return new Date().toISOString().split('T')[0]}

function toast(msg,type='success'){
  const c=document.getElementById('toasts');
  const cols={success:'bg-emerald-600',error:'bg-red-600',info:'bg-slate-800',warning:'bg-amber-500'};
  const t=document.createElement('div');
  t.className=`pointer-events-auto flex items-center gap-3 px-5 py-3 rounded-xl shadow-lg text-white text-sm font-medium ${cols[type]||cols.info} t-enter`;
  t.textContent=msg;
  c.appendChild(t);
  setTimeout(()=>{t.classList.remove('t-enter');t.classList.add('t-exit');setTimeout(()=>t.remove(),300)},3000);
}

function calcRow(q,p,d,t){const b=q*p;const da=b*(d/100);const ad=b-da;return ad+ad*(t/100)}
function calcTotals(items){let s=0,d=0,t=0;items.forEach(i=>{const b=i.quantity*i.price;const da=b*(i.discount/100);const ad=b-da;const ta=ad*(i.tax/100);s+=b;d+=da;t+=ta});return{subtotal:s,totalDiscount:d,totalTax:t,grandTotal:s-d+t}}

// --- Sidebar ---
function rSidebar(){
  const navs=[{id:'dashboard',l:'Dashboard',ic:I.layout},{id:'new-invoice',l:'New Invoice',ic:I.plus},{id:'history',l:'Invoice History',ic:I.file},{id:'settings',l:'Settings',ic:I.gear}];
  const ac=S.invoices.filter(i=>!i.archived).length;
  const ar=S.invoices.filter(i=>i.archived).length;
  return`
  <aside id="sidebar" class="fixed lg:sticky top-0 left-0 h-screen z-50 w-[260px] bg-slate-900 text-white flex flex-col transform ${S.sbOpen?'translate-x-0':'-translate-x-full'} lg:translate-x-0">
    <div class="px-6 py-5 border-b border-slate-700/50">
      <div class="flex items-center gap-3">
        <div class="w-10 h-10 rounded-xl bg-emerald-600 flex items-center justify-center flex-shrink-0">${I.steth}</div>
        <div><h1 class="text-base font-bold tracking-tight">MedBill Pro</h1><p class="text-[11px] text-slate-400 font-medium">Invoice Management</p></div>
      </div>
    </div>
    <nav class="flex-1 px-3 py-4 space-y-1 overflow-y-auto">
      ${navs.map(n=>`<button data-nav="${n.id}" class="w-full flex items-center gap-3 px-4 py-2.5 rounded-lg text-sm font-medium transition-all btn-p ${S.view===n.id||(S.view==='invoice-detail'&&n.id==='history')?'bg-emerald-600/20 text-emerald-400':'text-slate-300 hover:bg-slate-800 hover:text-white'}"><span class="flex-shrink-0">${n.ic}</span>${n.l}</button>`).join('')}
    </nav>
    <div class="px-4 py-4 border-t border-slate-700/50">
      <div class="bg-slate-800/60 rounded-xl p-4">
        <div class="flex justify-between text-xs mb-2"><span class="text-slate-400">Active</span><span class="text-emerald-400 font-semibold">${ac}</span></div>
        <div class="flex justify-between text-xs"><span class="text-slate-400">Archived</span><span class="text-slate-300 font-semibold">${ar}</span></div>
      </div>
    </div>
  </aside>
  <div id="sb-overlay" class="fixed inset-0 bg-black/50 z-40 lg:hidden ${S.sbOpen?'opacity-100':'opacity-0 pointer-events-none'}" data-act="close-sb"></div>`;
}

// --- Topbar ---
function rTop(title){
  return`<header class="sticky top-0 z-30 bg-white/80 backdrop-blur-md border-b border-gray-100">
  <div class="flex items-center justify-between h-16 px-4 lg:px-8">
    <div class="flex items-center gap-4">
      <button data-act="toggle-sb" class="lg:hidden p-2 rounded-lg hover:bg-gray-100 transition-colors">${I.menu}</button>
      <h2 class="text-lg font-bold text-slate-900">${title}</h2>
    </div>
    <button data-nav="new-invoice" class="flex items-center gap-2 bg-emerald-600 hover:bg-emerald-700 text-white text-sm font-semibold px-4 py-2 rounded-lg transition-colors btn-p">${I.plus}<span class="hidden sm:inline">New Invoice</span></button>
  </div></header>`;
}

// --- Dashboard ---
function rDash(){
  const act=S.invoices.filter(i=>!i.archived);
  const arv=S.invoices.filter(i=>i.archived);
  const totRev=act.reduce((s,i)=>s+i.grandTotal,0);
  const now=new Date();
  const mInv=act.filter(i=>{const d=new Date(i.date);return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear()});
  const mRev=mInv.reduce((s,i)=>s+i.grandTotal,0);
  const recent=[...act].sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt)).slice(0,5);

  const cards=[
    {l:'Total Revenue',v:fc(totRev),ic:I.dollar,c:'emerald',dl:0},
    {l:'Total Invoices',v:act.length,ic:I.fchk,c:'blue',dl:80},
    {l:'This Month',v:fc(mRev),ic:I.cal,c:'violet',dl:160},
    {l:'Archived',v:arv.length,ic:I.abox,c:'amber',dl:240}
  ];
  const cm={emerald:{ic:'bg-emerald-100 text-emerald-600'},blue:{ic:'bg-blue-100 text-blue-600'},violet:{ic:'bg-violet-100 text-violet-600'},amber:{ic:'bg-amber-100 text-amber-600'}};

  return`${rTop('Dashboard')}
  <div class="p-4 lg:p-8 v-enter">
    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 lg:gap-6 mb-8">
      ${cards.map((c,i)=>`<div class="c-enter bg-white rounded-2xl border border-gray-100 p-5 hover:shadow-lg hover:shadow-gray-200/50 transition-all duration-300" style="animation-delay:${c.dl}ms">
        <div class="flex items-start justify-between mb-4">
          <div class="w-11 h-11 rounded-xl ${cm[c.c].ic} flex items-center justify-center">${c.ic}</div>
          <span class="text-[10px] font-bold text-slate-400 uppercase tracking-wider">${c.l}</span>
        </div>
        <div class="text-2xl font-bold text-slate-900 tracking-tight">${c.v}</div>
      </div>`).join('')}
    </div>
    <div class="grid grid-cols-1 xl:grid-cols-3 gap-6">
      <div class="xl:col-span-2 bg-white rounded-2xl border border-gray-100 overflow-hidden">
        <div class="flex items-center justify-between px-6 py-4 border-b border-gray-50">
          <h3 class="font-semibold text-slate-900">Recent Invoices</h3>
          <button data-nav="history" class="text-sm text-emerald-600 hover:text-emerald-700 font-medium">View All</button>
        </div>
        ${recent.length===0?`<div class="p-12 text-center">
          <div class="w-16 h-16 rounded-2xl bg-gray-50 flex items-center justify-center mx-auto mb-4 text-slate-300">${I.file}</div>
          <p class="text-slate-400 text-sm mb-4">No invoices yet. Create your first one.</p>
          <button data-nav="new-invoice" class="inline-flex items-center gap-2 bg-emerald-600 hover:bg-emerald-700 text-white text-sm font-semibold px-5 py-2.5 rounded-lg btn-p">${I.plus} Create Invoice</button>
        </div>`:`<div class="divide-y divide-gray-50">${recent.map(inv=>`

// --- History ---
function rHist(){
  let invs=[...S.invoices];
  if(S.search){const q=S.search.toLowerCase();invs=invs.filter(i=>i.customerName.toLowerCase().includes(q)||i.invoiceNumber.toLowerCase().includes(q)||(i.customerPhone&&i.customerPhone.includes(q)))}
  if(S.filter==='active')invs=invs.filter(i=>!i.archived);
  else if(S.filter==='archived')invs=invs.filter(i=>i.archived);
  if(S.sort==='date-desc')invs.sort((a,b)=>new Date(b.date)-new Date(a.date));
  else if(S.sort==='date-asc')invs.sort((a,b)=>new Date(a.date)-new Date(b.date));
  else if(S.sort==='amt-desc')invs.sort((a,b)=>b.grandTotal-a.grandTotal);
  else if(S.sort==='amt-asc')invs.sort((a,b)=>a.grandTotal-b.grandTotal);

  return`${rTop('Invoice History')}
  <div class="p-4 lg:p-8 v-enter">
    <div class="bg-white rounded-2xl border border-gray-100 p-4 mb-6">
      <div class="flex flex-col sm:flex-row gap-3">
        <div class="relative flex-1"><span class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400">${I.search}</span><input id="h-search" type="text" value="${S.search}" placeholder="Search by name, invoice number, or phone..." class="w-full pl-10 pr-4 py-2.5 text-sm border border-gray-200 rounded-lg bg-gray-50/50"/></div>
        <div class="flex gap-2">
          <select id="h-filter" class="px-3 py-2.5 text-sm border border-gray-200 rounded-lg bg-gray-50/50 min-w-[120px]">
            <option value="all" ${S.filter==='all'?'selected':''}>All Status</option>
            <option value="active" ${S.filter==='active'?'selected':''}>Active</option>
            <option value="archived" ${S.filter==='archived'?'selected':''}>Archived</option>
          </select>
          <select id="h-sort" class="px-3 py-2.5 text-sm border border-gray-200 rounded-lg bg-gray-50/50 min-w-[140px]">
            <option value="date-desc" ${S.sort==='date-desc'?'selected':''}>Newest First</option>
            <option value="date-asc" ${S.sort==='date-asc'?'selected':''}>Oldest First</option>
            <option value="amt-desc" ${S.sort==='amt-desc'?'selected':''}>Highest Amount</option>
            <option value="amt-asc" ${S.sort==='amt-asc'?'selected':''}>Lowest Amount</option>
          </select>
        </div>
      </div>
    </div>
    ${invs.length===0?`<div class="bg-white rounded-2xl border border-gray-100 p-16 text-center">
      <div class="w-16 h-16 rounded-2xl bg-gray-50 flex items-center justify-center mx-auto mb-4 text-slate-300">${I.file}</div>
      <p class="text-slate-400 text-sm mb-1">No invoices found</p>
      <p class="text-slate-300 text-xs">${S.search?'Try adjusting your search':'Create your first invoice'}</p>
    </div>`:`<div class="bg-white rounded-2xl border border-gray-100 overflow-hidden">
      <div class="hidden md:grid grid-cols-12 gap-4 px-6 py-3 bg-gray-50/80 border-b border-gray-100 text-[10px] font-bold text-slate-400 uppercase tracking-wider">
        <div class="col-span-2">Invoice</div><div class="col-span-3">Customer</div><div class="col-span-2">Date</div><div class="col-span-1">Items</div><div class="col-span-2 text-right">Amount</div><div class="col-span-2 text-right">Actions</div>
      </div>
      <div class="divide-y divide-gray-50">${invs.map(inv=>`
        <div class="grid grid-cols-1 md:grid-cols-12 gap-2 md:gap-4 px-6 py-4 hover:bg-gray-50/50 transition-colors items-center">
          <div class="md:col-span-2"><span class="inline-flex items-center gap-1.5 text-sm font-bold text-slate-800">${inv.archived?'<span class="w-1.5 h-1.5 rounded-full bg-slate-300"></span>':'<span class="w-1.5 h-1.5 rounded-full bg-emerald-500 pulse-dot"></span>'}${inv.invoiceNumber}</span></div>

          <div class="md:col-span-2 text-right"><span class="text-sm font-bold text-slate-900">${fc(inv.grandTotal)}</span>${inv.archived?'<span class="ml-1 text-[10px] bg-slate-100 text-slate-500 px-1.5 py-0.5 rounded font-semibold">Archived</span>':''}</div>
          <div class="md:col-span-2 flex justify-end gap-1">
            <button data-act="view-inv" data-id="${inv.id}" title="View" class="p-1.5 rounded-lg text-slate-400 hover:text-emerald-600 hover:bg-emerald-50 btn-p">${I.eye}</button>

      </div>
    </div>`}
  </div>`;
}

// --- Main Render ---
function render(){
  const app=document.getElementById('app');
  let content='';
  switch(S.view){
    case 'dashboard':content=rDash();break;
    case 'new-invoice':content=rNewInv();break;
    case 'history':content=rHist();break;
    case 'invoice-detail':content=rDetail();break;
    case 'settings':content=rSettings();break;
    default:content=rDash();
  }
  app.innerHTML=rSidebar()+`<main class="flex-1 min-h-screen overflow-x-hidden">${content}</main>`;
  if(S.view==='new-invoice')recalc();
}

// --- Form Recalc ---
function getItems(){
  const rows=document.querySelectorAll('#items-box .item-row');
  const items=[];
  rows.forEach(r=>{items.push({name:r.querySelector('[data-f="name"]')?.value||'',quantity:parseFloat(r.querySelector('[data-f="quantity"]')?.value)||0,price:parseFloat(r.querySelector('[data-f="price"]')?.value)||0,discount:parseFloat(r.querySelector('[data-f="discount"]')?.value)||0,tax:parseFloat(r.querySelector('[data-f="tax"]')?.value)||0})});
  return items;
}
function recalc(){
  const rows=document.querySelectorAll('#items-box .item-row');
  let sub=0,disc=0,tax=0;
  rows.forEach(r=>{
    const q=parseFloat(r.querySelector('[data-f="quantity"]')?.value)||0;
    const p=parseFloat(r.querySelector('[data-f="price"]')?.value)||0;
    const d=parseFloat(r.querySelector('[data-f="discount"]')?.value)||0;
    const t=parseFloat(r.querySelector('[data-f="tax"]')?.value)||0;
    const b=q*p;const da=b*(d/100);const ad=b-da;const ta=ad*(t/100);
    sub+=b;disc+=da;tax+=ta;
    const te=r.querySelector('.rtot');if(te)te.textContent=fc(ad+ta);
  });
  const g=sub-disc+tax;
  const el=id=>document.getElementById(id);
  if(el('s-sub'))el('s-sub').textContent=fc(sub);
  if(el('s-disc'))el('s-disc').textContent='-'+fc(disc);
  if(el('s-tax'))el('s-tax').textContent=fc(tax);
  if(el('s-grand'))el('s-grand').textContent=fc(g);
}

// --- Confirm Modal ---
function confirmModal(msg,cb){
  const m=document.createElement('div');
  m.className='fixed inset-0 z-[150] flex items-center justify-center p-4';
  m.style.cssText='background:rgba(15,23,42,0.6);backdrop-filter:blur(4px)';
  m.innerHTML=`<div class="bg-white rounded-2xl shadow-2xl p-6 w-full max-w-sm m-enter">
    <h3 class="text-base font-bold text-slate-900 mb-2">Confirm Action</h3>
    <p class="text-sm text-slate-500 mb-6">${msg}</p>
    <div class="flex gap-3 justify-end">
      <button class="cbtn px-4 py-2 text-sm font-medium border border-gray-200 hover:bg-gray-50 rounded-lg">Cancel</button>
      <button class="obtn px-4 py-2 text-sm font-semibold bg-red-600 hover:bg-red-700 text-white rounded-lg">Confirm</button>
    </div>
  </div>`;
  document.body.appendChild(m);
  m.querySelector('.cbtn').onclick=()=>m.remove();
  m.querySelector('.obtn').onclick=()=>{m.remove();cb()};
  m.addEventListener('click',e=>{if(e.target===m)m.remove()});
}

// --- Export Functions ---
function expPDF(id){
  const inv=S.invoices.find(i=>i.id===id);if(!inv)return;
  toast('Generating PDF...','info');
  const box=document.getElementById('inv-export');
  box.innerHTML=rInvTmpl(inv);
  box.style.left='0';
  setTimeout(()=>{
    html2canvas(box,{scale:2,useCORS:true,backgroundColor:'#ffffff'}).then(canvas=>{
      const{jsPDF}=window.jspdf;
      const pdf=new jsPDF('p','mm','a4');
      const iw=210;const ih=(canvas.height*iw)/canvas.width;
      pdf.addImage(canvas.toDataURL('image/png'),'PNG',0,0,iw,ih);
      pdf.save(inv.invoiceNumber+'.pdf');
      box.style.left='-9999px';box.innerHTML='';
      toast('PDF downloaded','success');
    }).catch(()=>{box.style.left='-9999px';toast('PDF failed','error')});
  },300);
}

function expImg(id){
  const inv=S.invoices.find(i=>i.id===id);if(!inv)return;
  toast('Generating image...','info');
  const box=document.getElementById('inv-export');
  box.innerHTML=rInvTmpl(inv);
  box.style.left='0';
  setTimeout(()=>{
    html2canvas(box,{scale:2,useCORS:true,backgroundColor:'#ffffff'}).then(canvas=>{
      const a=document.createElement('a');a.download=inv.invoiceNumber+'.png';a.href=canvas.toDataURL('image/png');a.click();
      box.style.left='-9999px';box.innerHTML='';
      toast('Image downloaded','success');
    }).catch(()=>{box.style.left='-9999px';toast('Image failed','error')});
  },300);
}

function shareWA(id){
  const inv=S.invoices.find(i=>i.id===id);if(!inv)return;
  const p=S.profile;
  const ph=inv.customerPhone?inv.customerPhone.replace(/[^0-9+]/g,''):'';
  const msg=encodeURIComponent(`Hello ${inv.customerName}, thank you for visiting ${p.chamberName||'our chamber'}. Your invoice ${inv.invoiceNumber} for ${p.currency} ${inv.grandTotal.toFixed(2)} is ready. Regards, ${p.doctorName||'Doctor'}.`);
  const url=ph?`https://wa.me/${ph.replace('+','')}?text=${msg}`:`https://wa.me/?text=${msg}`;
  window.open(url,'_blank');
  toast('Opening WhatsApp...','success');
}

function expAllJSON(){
  if(!S.invoices.length){toast('No invoices','warning');return}
  const d=JSON.stringify(S.invoices,null,2);
  const b=new Blob([d],{type:'application/json'});
  const a=document.createElement('a');a.download='medbill_'+today()+'.json';a.href=URL.createObjectURL(b);a.click();URL.revokeObjectURL(a.href);
  toast('JSON exported','success');
}

function expAllXLS(){
  if(!S.invoices.length){toast('No invoices','warning');return}
  try{
    const rows=S.invoices.map(inv=>({'Invoice #':inv.invoiceNumber,Date:inv.date,Customer:inv.customerName,Phone:inv.customerPhone||'',Items:inv.items.map(i=>i.name).join(', '),'Subtotal':inv.subtotal,'Discount':inv.totalDiscount,'Tax':inv.totalTax,'Grand Total':inv.grandTotal,Archived:inv.archived?'Yes':'No'}));
    const ws=XLSX.utils.json_to_sheet(rows);
    const wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,ws,'Invoices');
    XLSX.writeFile(wb,'medbill_'+today()+'.xlsx');
    toast('Excel exported','success');
  }catch(e){toast('Excel export failed','error')}
}

function expAllCSV(){
  if(!S.invoices.length){toast('No invoices','warning');return}
  try{
    const rows=S.invoices.map(inv=>[inv.invoiceNumber,inv.date,inv.customerName,inv.customerPhone||'',inv.items.map(i=>i.name).join('; '),inv.subtotal,inv.totalDiscount,inv.totalTax,inv.grandTotal,inv.archived?'Yes':'No']);
    const hdr=['Invoice #','Date','Customer','Phone','Items','Subtotal','Discount','Tax','Grand Total','Archived'];
    const csv=[hdr,...rows].map(r=>r.map(c=>'"'+String(c).replace(/"/g,'""')+'"').join(',')).join('\n');
    const b=new Blob([csv],{type:'text/csv'});
    const a=document.createElement('a');a.download='medbill_'+today()+'.csv';a.href=URL.createObjectURL(b);a.click();URL.revokeObjectURL(a.href);
    toast('CSV exported','success');
  }catch(e){toast('CSV export failed','error')}
}

// --- Event Delegation ---
document.addEventListener('click',function(e){
  const nav=e.target.closest('[data-nav]');
  const act=e.target.closest('[data-act]');

  if(nav){
    e.preventDefault();
    const v=nav.dataset.nav;
    if(v==='new-invoice'&&S.view!=='new-invoice')S.editId=null;
    S.view=v;S.sbOpen=false;saveS();render();
    return;
  }

  if(!act)return;
  const a=act.dataset.act;
  const id=act.dataset.id;

  switch(a){
    case 'toggle-sb':S.sbOpen=!S.sbOpen;render();break;
    case 'close-sb':S.sbOpen=false;render();break;

    case 'view-inv':S.detailId=id;S.view='invoice-detail';saveS();render();break;

    case 'add-item':{
      const box=document.getElementById('items-box');if(!box)return;
      const cur=getItems();cur.push({name:'',quantity:1,price:0,discount:0,tax:0});
      box.insertAdjacentHTML('beforeend',rItemRow({name:'',quantity:1,price:0,discount:0,tax:0},cur.length-1));
      recalc();box.lastElementChild?.scrollIntoView({behavior:'smooth',block:'nearest'});
      break;
    }

    case 'rm-item':{
      const box=document.getElementById('items-box');if(!box)return;
      const rows=box.querySelectorAll('.item-row');
      if(rows.length<=1){toast('At least one item required','warning');return}
      const idx=parseInt(act.dataset.idx);
      rows[idx]?.classList.add('r-exit');
      setTimeout(()=>{rows[idx]?.remove();box.querySelectorAll('.item-row').forEach((r,i)=>{r.dataset.idx=i;const rb=r.querySelector('[data-act="rm-item"]');if(rb)rb.dataset.idx=i});recalc()},250);
      break;
    }

    case 'save-inv':{
      const cn=document.getElementById('i-cust')?.value.trim();
      const cp=document.getElementById('i-phone')?.value.trim();
      const dt=document.getElementById('i-date')?.value;
      const nm=document.getElementById('i-num')?.value;
      const nt=document.getElementById('i-notes')?.value.trim();
      const items=getItems().filter(i=>i.name.trim());
      if(!cn){toast('Customer name is required','error');document.getElementById('i-cust')?.focus();return}
      if(!items.length){toast('Add at least one item','error');return}
      const tot=calcTotals(items);
      const inv={id:S.editId||gid(),invoiceNumber:nm,date:dt||today(),customerName:cn,customerPhone:cp,items,notes:nt,...tot,archived:false,createdAt:S.editId?(S.invoices.find(i=>i.id===S.editId)?.createdAt||new Date().toISOString()):new Date().toISOString()};
      if(S.editId){const idx=S.invoices.findIndex(i=>i.id===S.editId);if(idx!==-1){inv.archived=S.invoices[idx].archived;S.invoices[idx]=inv}S.editId=null;toast('Invoice updated','success')}
      else{S.invoices.push(inv);S.nextNum++;toast('Invoice created','success')}
      S.detailId=inv.id;S.view='invoice-detail';saveS();render();
      break;
    }

    case 'cancel-edit':S.editId=null;S.view='history';saveS();render();break;
    case 'edit-inv':S.editId=id;S.view='new-invoice';saveS();render();break;

    case 'arch-inv':{const inv=S.invoices.find(i=>i.id===id);if(inv){inv.archived=true;saveS();toast('Invoice archived','info');render()}break}
    case 'unarch-inv':{const inv=S.invoices.find(i=>i.id===id);if(inv){inv.archived=false;saveS();toast('Invoice restored','success');render()}break}

    case 'del-inv':confirmModal('Delete this invoice permanently?',()=>{S.invoices=S.invoices.filter(i=>i.id!==id);saveS();toast('Invoice deleted','info');if(S.view==='invoice-detail')S.view='history';render()});break;

    case 'back-hist':S.view='history';S.detailId=null;saveS();render();break;

    case 'save-set':{
      S.profile.chamberName=document.getElementById('s-ch')?.value.trim()||'';
      S.profile.address=document.getElementById('s-addr')?.value.trim()||'';
      S.profile.contact=document.getElementById('s-cont')?.value.trim()||'';
      S.profile.doctorName=document.getElementById('s-doc')?.value.trim()||'';
      S.profile.currency=document.getElementById('s-cur')?.value.trim()||'BDT';
      S.profile.sym=document.getElementById('s-sym')?.value.trim()||'৳';
      saveS();toast('Profile saved','success');render();
      break;
    }

    case 'upload-logo':document.getElementById('f-logo')?.click();break;
    case 'rm-logo':S.profile.logo=null;saveS();toast('Logo removed','info');render();break;

    case 'exp-pdf':expPDF(id);break;
    case 'exp-img':expImg(id);break;
    case 'share-wa':shareWA(id);break;

    case 'exp-all-json':expAllJSON();break;
    case 'exp-all-xls':expAllXLS();break;
    case 'exp-all-csv':expAllCSV();break;
    case 'imp-json':document.getElementById('f-json')?.click();break;

    case 'clear-all':confirmModal('This will permanently delete all data. Continue?',()=>{S=defState();saveS();toast('All data cleared','info');render()});break;
  }
});

// Input events for live calculation
document.addEventListener('input',function(e){
  if(e.target.closest('#items-box')&&e.target.matches('[data-f]'))recalc();
  if(e.target.id==='h-search'){S.search=e.target.value;const m=document.querySelector('#app main');if(m)m.innerHTML=rHist()}
});
document.addEventListener('change',function(e){
  if(e.target.id==='h-filter'){S.filter=e.target.value;const m=document.querySelector('#app main');if(m)m.innerHTML=rHist()}
  if(e.target.id==='h-sort'){S.sort=e.target.value;const m=document.querySelector('#app main');if(m)m.innerHTML=rHist()}
});

// File inputs
document.getElementById('f-logo').addEventListener('change',function(e){
  const f=e.target.files?.[0];if(!f)return;
  if(f.size>2*1024*1024){toast('Logo must be under 2MB','error');return}
  const r=new FileReader();
  r.onload=ev=>{S.profile.logo=ev.target.result;saveS();toast('Logo uploaded','success');render()};
  r.readAsDataURL(f);e.target.value='';
});

document.getElementById('f-json').addEventListener('change',function(e){
  const f=e.target.files?.[0];if(!f)return;
  const r=new FileReader();
  r.onload=ev=>{
    try{
      const d=JSON.parse(ev.target.result);
      const invs=Array.isArray(d)?d:(d.invoices||[]);
      let c=0;
      invs.forEach(inv=>{if(inv.id&&inv.invoiceNumber&&inv.customerName&&!S.invoices.find(i=>i.id===inv.id)){S.invoices.push(inv);c++}});
      const mx=S.invoices.reduce((m,i)=>{const n=parseInt(i.invoiceNumber?.replace(/\D/g,''))||0;return n>m?n:m},S.nextNum);
      S.nextNum=mx+1;
      saveS();toast(`Imported ${c} invoice${c!==1?'s':''}`,'success');render();
    }catch(err){toast('Invalid JSON file','error')}
  };
  r.readAsText(f);e.target.value='';
});

// Initial render
render();
</script>
