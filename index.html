<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MedBill Pro — Doctor's Chamber & Pharmacy Invoice System</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = {
  theme: {
    extend: {
      fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] },
    }
  }
}
</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --sidebar-w: 260px;
    --topbar-h: 64px;
  }
  * { box-sizing: border-box; }
  body { font-family: 'Inter', sans-serif; }

  /* 滚动条美化 */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

  /* 页面切换动画 */
  .view-enter { animation: viewIn 0.35s cubic-bezier(0.16,1,0.3,1) forwards; }
  @keyframes viewIn {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* 卡片入场动画 */
  .card-enter { animation: cardIn 0.4s cubic-bezier(0.16,1,0.3,1) forwards; opacity: 0; }
  @keyframes cardIn {
    from { opacity: 0; transform: translateY(16px) scale(0.97); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }

  /* Toast 动画 */
  .toast-enter { animation: toastIn 0.4s cubic-bezier(0.16,1,0.3,1) forwards; }
  .toast-exit { animation: toastOut 0.3s ease-in forwards; }
  @keyframes toastIn {
    from { opacity: 0; transform: translateX(100px); }
    to { opacity: 1; transform: translateX(0); }
  }
  @keyframes toastOut {
    from { opacity: 1; transform: translateX(0); }
    to { opacity: 0; transform: translateX(100px); }
  }

  /* 侧边栏过渡 */
  #sidebar { transition: transform 0.3s cubic-bezier(0.16,1,0.3,1); }
  #sidebar-overlay { transition: opacity 0.3s ease; }

  /* 按钮点击反馈 */
  .btn-press { transition: transform 0.1s ease; }
  .btn-press:active { transform: scale(0.96); }

  /* 输入框聚焦 */
  input:focus, select:focus, textarea:focus {
    outline: none;
    box-shadow: 0 0 0 3px rgba(5,150,105,0.15);
    border-color: #059669 !important;
  }

  /* 行项目移除动画 */
  .item-row-exit {
    animation: rowExit 0.25s ease forwards;
  }
  @keyframes rowExit {
    to { opacity: 0; transform: translateX(-20px); height: 0; margin: 0; padding: 0; overflow: hidden; }
  }

  /* 脉冲动画 */
  .pulse-dot {
    animation: pulseDot 2s ease-in-out infinite;
  }
  @keyframes pulseDot {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  /* 浮动标签 */
  .float-label { position: relative; }
  .float-label label {
    position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
    transition: all 0.2s ease; pointer-events: none;
    color: #94a3b8; font-size: 14px;
  }
  .float-label input:focus + label,
  .float-label input:not(:placeholder-shown) + label {
    top: 6px; transform: translateY(0);
    font-size: 10px; color: #059669; font-weight: 600;
  }

  /* 数字动画 */
  .counter-animate {
    transition: all 0.6s cubic-bezier(0.16,1,0.3,1);
  }

  /* 打印样式 */
  @media print {
    body * { visibility: hidden; }
    #invoice-export, #invoice-export * { visibility: visible; }
    #invoice-export { position: absolute; left: 0; top: 0; }
  }

  /* 模态框 */
  .modal-backdrop {
    background: rgba(15,23,42,0.6);
    backdrop-filter: blur(4px);
  }
  .modal-enter { animation: modalIn 0.3s cubic-bezier(0.16,1,0.3,1) forwards; }
  @keyframes modalIn {
    from { opacity: 0; transform: scale(0.95) translateY(10px); }
    to { opacity: 1; transform: scale(1) translateY(0); }
  }
</style>
</head>
<body class="bg-gray-50 text-slate-800 antialiased">

// ---------- 状态管理 ----------
const STORAGE_KEY = 'medbill_pro_data';

function getDefaultState() {
  return {
    currentView: 'dashboard',
    invoices: [],
    profile: {
      chamberName: 'HealthFirst Medical Chamber',
      address: '123 Medical Plaza, Dhanmondi, Dhaka 1205',
      contact: '+880 1712-345678',
      doctorName: 'Dr. Aminul Haque',
      logo: null,
      currency: 'BDT',
      currencySymbol: '৳'
    },
    nextInvoiceNumber: 1001,
    editingInvoiceId: null,
    searchQuery: '',
    filterStatus: 'all',
    sortBy: 'date-desc',
    sidebarOpen: false,
    detailInvoiceId: null
  };
}

let state = loadState();

function loadState() {
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) {
      const parsed = JSON.parse(saved);
      return { ...getDefaultState(), ...parsed };
    }
  } catch(e) { console.warn('Failed to load state:', e); }
  return getDefaultState();
}

function saveState() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  } catch(e) { console.warn('Failed to save state:', e); }
}

// ---------- 工具函数 ----------
function genId() {
  return 'inv_' + Date.now().toString(36) + Math.random().toString(36).substr(2, 5);
}

function formatCurrency(amount) {
  return state.profile.currencySymbol + ' ' + Number(amount || 0).toFixed(2);
}

function formatDate(dateStr) {
  if (!dateStr) return '—';
  const d = new Date(dateStr);
  return d.toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' });
}

function todayISO() {
  return new Date().toISOString().split('T')[0];
}

function showToast(message, type = 'success') {
  const container = document.getElementById('toast-container');
  const colors = {
    success: 'bg-emerald-600 text-white',
    error: 'bg-red-600 text-white',
    info: 'bg-slate-800 text-white',
    warning: 'bg-amber-500 text-white'
  };
  const icons = {
    success: ICO.check,
    error: ICO.x,
    info: ICO.eye,
    warning: ICO.archive
  };
  const toast = document.createElement('div');
  toast.className = `pointer-events-auto flex items-center gap-3 px-5 py-3 rounded-xl shadow-lg ${colors[type] || colors.info} toast-enter`;
  toast.innerHTML = `<span class="flex-shrink-0">${icons[type] || icons.info}</span><span class="text-sm font-medium">${message}</span>`;
  container.appendChild(toast);
  setTimeout(() => {
    toast.classList.remove('toast-enter');
    toast.classList.add('toast-exit');
    setTimeout(() => toast.remove(), 300);
  }, 3000);
}

// ---------- 计算函数 ----------
function calcRowTotal(qty, price, discountPct, taxPct) {
  const base = qty * price;
  const discAmt = base * (discountPct / 100);
  const afterDisc = base - discAmt;
  const taxAmt = afterDisc * (taxPct / 100);
  return afterDisc + taxAmt;
}

function calcInvoiceTotals(items) {
  let subtotal = 0, totalDiscount = 0, totalTax = 0;
  items.forEach(it => {
    const base = it.quantity * it.price;
    const discAmt = base * (it.discount / 100);
    const afterDisc = base - discAmt;
    const taxAmt = afterDisc * (it.tax / 100);
    subtotal += base;
    totalDiscount += discAmt;
    totalTax += taxAmt;
  });
  return { subtotal, totalDiscount, totalTax, grandTotal: subtotal - totalDiscount + totalTax };
}

// ---------- 仪表板视图 ----------
function renderDashboard() {
  const active = state.invoices.filter(i => !i.archived);
  const archived = state.invoices.filter(i => i.archived);
  const totalRevenue = active.reduce((s, i) => s + i.grandTotal, 0);
  const now = new Date();
  const thisMonth = active.filter(i => {
    const d = new Date(i.date);
    return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
  });
  const monthRevenue = thisMonth.reduce((s, i) => s + i.grandTotal, 0);

  const recent = [...state.invoices].filter(i => !i.archived).sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt)).slice(0, 5);

  const cards = [
    { label: 'Total Revenue', value: formatCurrency(totalRevenue), icon: ICO.dollarSign, color: 'emerald', delay: 0 },
    { label: 'Total Invoices', value: active.length, icon: ICO.fileCheck, color: 'blue', delay: 80 },
    { label: 'This Month', value: formatCurrency(monthRevenue), icon: ICO.calendar, color: 'violet', delay: 160 },
    { label: 'Archived', value: archived.length, icon: ICO.archiveBox, color: 'amber', delay: 240 },
  ];

  const colorMap = {
    emerald: { bg: 'bg-emerald-50', icon: 'bg-emerald-100 text-emerald-600', border: 'border-emerald-100' },
    blue: { bg: 'bg-blue-50', icon: 'bg-blue-100 text-blue-600', border: 'border-blue-100' },
    violet: { bg: 'bg-violet-50', icon: 'bg-violet-100 text-violet-600', border: 'border-violet-100' },
    amber: { bg: 'bg-amber-50', icon: 'bg-amber-100 text-amber-600', border: 'border-amber-100' },
  };

  return `
    ${renderTopBar('Dashboard')}
    <div class="p-4 lg:p-8 view-enter">

      <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 lg:gap-6 mb-8">

          return `

            <div class="flex items-start justify-between mb-4">
              <div class="w-11 h-11 rounded-xl ${cm.icon} flex items-center justify-center">${c.icon}</div>

            <div class="text-2xl font-bold text-slate-900 tracking-tight">${c.value}</div>
          </div>`;

      <!-- 最近发票 & 快捷操作 -->
      <div class="grid grid-cols-1 xl:grid-cols-3 gap-6">
        <!-- 最近发票 -->

// ---------- 发票历史视图 ----------
function renderHistory() {
  let invoices = [...state.invoices];

  // 搜索过滤
  if (state.searchQuery) {
    const q = state.searchQuery.toLowerCase();
    invoices = invoices.filter(i =>
      i.customerName.toLowerCase().includes(q) ||
      i.invoiceNumber.toLowerCase().includes(q) ||
      (i.customerPhone && i.customerPhone.includes(q))
    );
  }

  // 状态过滤
  if (state.filterStatus === 'active') invoices = invoices.filter(i => !i.archived);
  else if (state.filterStatus === 'archived') invoices = invoices.filter(i => i.archived);

  // 排序
  switch (state.sortBy) {
    case 'date-desc': invoices.sort((a, b) => new Date(b.date) - new Date(a.date)); break;
    case 'date-asc': invoices.sort((a, b) => new Date(a.date) - new Date(b.date)); break;
    case 'amount-desc': invoices.sort((a, b) => b.grandTotal - a.grandTotal); break;
    case 'amount-asc': invoices.sort((a, b) => a.grandTotal - b.grandTotal); break;
  }

  return `
    ${renderTopBar('Invoice History')}
    <div class="p-4 lg:p-8 view-enter">
      <!-- 搜索 & 过滤栏 -->
      <div class="bg-white rounded-2xl border border-gray-100 p-4 mb-6">
        <div class="flex flex-col sm:flex-row gap-3">
          <div class="relative flex-1">
            <span class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400">${ICO.search}</span>
            <input id="history-search" type="text" value="${state.searchQuery}" placeholder="Search by name, invoice number, or phone..." class="w-full pl-10 pr-4 py-2.5 text-sm border border-gray-200 rounded-lg bg-gray-50/50 transition-all" />
          </div>
          <div class="flex gap-2">
            <select id="history-filter" class="px-3 py-2.5 text-sm border border-gray-200 rounded-lg bg-gray-50/50 transition-all min-w-[120px]">
              <option value="all" ${state.filterStatus === 'all' ? 'selected' : ''}>All Status</option>
              <option value="active" ${state.filterStatus === 'active' ? 'selected' : ''}>Active</option>
              <option value="archived" ${state.filterStatus === 'archived' ? 'selected' : ''}>Archived</option>
            </select>
            <select id="history-sort" class="px-3 py-2.5 text-sm border border-gray-200 rounded-lg bg-gray-50/50 transition-all min-w-[140px]">
              <option value="date-desc" ${state.sortBy === 'date-desc' ? 'selected' : ''}>Newest First</option>
              <option value="date-asc" ${state.sortBy === 'date-asc' ? 'selected' : ''}>Oldest First</option>
              <option value="amount-desc" ${state.sortBy === 'amount-desc' ? 'selected' : ''}>Highest Amount</option>
              <option value="amount-asc" ${state.sortBy === 'amount-asc' ? 'selected' : ''}>Lowest Amount</option>
            </select>
          </div>
        </div>
      </div>

      <!-- 发票列表 -->
      ${invoices.length === 0 ? `
        <div class="bg-white rounded-2xl border border-gray-100 p-16 text-center">
          <div class="w-16 h-16 rounded-2xl bg-gray-50 flex items-center justify-center mx-auto mb-4 text-slate-300">${ICO.fileText}</div>

function renderApp() {
  const app = document.getElementById('app');
  let contentHTML = '';

  switch (state.currentView) {
    case 'dashboard': contentHTML = renderDashboard(); break;
    case 'new-invoice': contentHTML = renderNewInvoice(); break;
    case 'history': contentHTML = renderHistory(); break;
    case 'invoice-detail': contentHTML = renderInvoiceDetail(); break;
    case 'settings': contentHTML = renderSettings(); break;
    default: contentHTML = renderDashboard();
  }

  app.innerHTML = `
    ${renderSidebar()}
    <main class="flex-1 min-h-screen overflow-x-hidden">
      ${contentHTML}
    </main>
  `;

  // 后续初始化
  if (state.currentView === 'new-invoice') {
    recalcFormTotals();
  }
}

// ---------- 表单计算 ----------
function getFormItems() {
  const rows = document.querySelectorAll('#items-container .item-row');
  const items = [];
  rows.forEach(row => {
    items.push({
      name: row.querySelector('[data-field="name"]')?.value || '',
      quantity: parseFloat(row.querySelector('[data-field="quantity"]')?.value) || 0,
      price: parseFloat(row.querySelector('[data-field="price"]')?.value) || 0,
      discount: parseFloat(row.querySelector('[data-field="discount"]')?.value) || 0,
      tax: parseFloat(row.querySelector('[data-field="tax"]')?.value) || 0,
    });
  });
  return items;
}

function recalcFormTotals() {
  const rows = document.querySelectorAll('#items-container .item-row');
  let subtotal = 0, totalDiscount = 0, totalTax = 0;

  rows.forEach(row => {
    const qty = parseFloat(row.querySelector('[data-field="quantity"]')?.value) || 0;
    const price = parseFloat(row.querySelector('[data-field="price"]')?.value) || 0;
    const disc = parseFloat(row.querySelector('[data-field="discount"]')?.value) || 0;
    const tax = parseFloat(row.querySelector('[data-field="tax"]')?.value) || 0;

    const base = qty * price;
    const discAmt = base * (disc / 100);
    const afterDisc = base - discAmt;
    const taxAmt = afterDisc * (tax / 100);
    const rowTotal = afterDisc + taxAmt;

    subtotal += base;
    totalDiscount += discAmt;
    totalTax += taxAmt;

    const totalEl = row.querySelector('.row-total');
    if (totalEl) totalEl.textContent = formatCurrency(rowTotal);
  });

  const grandTotal = subtotal - totalDiscount + totalTax;

  const el = id => document.getElementById(id);
  if (el('summary-subtotal')) el('summary-subtotal').textContent = formatCurrency(subtotal);
  if (el('summary-discount')) el('summary-discount').textContent = '-' + formatCurrency(totalDiscount);
  if (el('summary-tax')) el('summary-tax').textContent = formatCurrency(totalTax);
  if (el('summary-grand')) el('summary-grand').textContent = formatCurrency(grandTotal);
}

// ---------- 事件处理 ----------
document.addEventListener('click', function(e) {
  const btn = e.target.closest('[data-action]');
  const nav = e.target.closest('[data-nav]');
  const viewBtn = e.target.closest('[data-action="view-invoice"]');

  // 导航
  if (nav) {
    e.preventDefault();
    const view = nav.dataset.nav;
    if (view === 'new-invoice' && state.currentView !== 'new-invoice') {
      state.editingInvoiceId = null;
    }
    state.currentView = view;
    state.sidebarOpen = false;
    saveState();
    renderApp();
    return;
  }

  // 查看发票
  if (viewBtn) {
    e.preventDefault();
    state.detailInvoiceId = viewBtn.dataset.id;
    state.currentView = 'invoice-detail';
    saveState();
    renderApp();
    return;
  }

  if (!btn) return;
  const action = btn.dataset.action;
  const id = btn.dataset.id;

  switch (action) {
    case 'toggle-sidebar':
      state.sidebarOpen = !state.sidebarOpen;
      renderApp();
      break;

    case 'close-sidebar':
      state.sidebarOpen = false;
      renderApp();
      break;

    case 'add-item': {
      const container = document.getElementById('items-container');
      if (!container) return;
      const currentItems = getFormItems();
      currentItems.push({ name: '', quantity: 1, price: 0, discount: 0, tax: 0 });
      container.insertAdjacentHTML('beforeend', renderItemRow({ name: '', quantity: 1, price: 0, discount: 0, tax: 0 }, currentItems.length - 1));
      recalcFormTotals();
      // 滚动到新行
      container.lastElementChild?.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
      break;
    }

    case 'remove-item': {
      const idx = parseInt(btn.dataset.idx);
      const container = document.getElementById('items-container');
      if (!container) return;
      const rows = container.querySelectorAll('.item-row');
      if (rows.length <= 1) {
        showToast('At least one item is required', 'warning');
        return;
      }
      rows[idx]?.classList.add('item-row-exit');
      setTimeout(() => {
        rows[idx]?.remove();
        // 重新索引
        container.querySelectorAll('.item-row').forEach((row, i) => {
          row.dataset.idx = i;
          const removeBtn = row.querySelector('[data-action="remove-item"]');
          if (removeBtn) removeBtn.dataset.idx = i;
        });
        recalcFormTotals();
      }, 250);
      break;
    }

    case 'save-invoice': {
      const customerName = document.getElementById('inv-customer')?.value.trim();
      const customerPhone = document.getElementById('inv-phone')?.value.trim();
      const date = document.getElementById('inv-date')?.value;
      const invoiceNumber = document.getElementById('inv-number')?.value;
      const notes = document.getElementById('inv-notes')?.value.trim();
      const items = getFormItems().filter(it => it.name.trim() !== '');

      if (!customerName) {
        showToast('Customer name is required', 'error');
        document.getElementById('inv-customer')?.focus();
        return;
      }
      if (items.length === 0) {
        showToast('Add at least one item with a name', 'error');
        return;
      }

      const totals = calcInvoiceTotals(items);
      const invoice = {
        id: state.editingInvoiceId || genId(),
        invoiceNumber,
        date: date || todayISO(),
        customerName,
        customerPhone,
        items,
        notes,
        ...totals,
        archived: false,
        createdAt: state.editingInvoiceId
          ? (state.invoices.find(i => i.id === state.editingInvoiceId)?.createdAt || new Date().toISOString())
          : new Date().toISOString()
      };

      if (state.editingInvoiceId) {
        const idx = state.invoices.findIndex(i => i.id === state.editingInvoiceId);
        if (idx !== -1) {
          invoice.archived = state.invoices[idx].archived;
          state.invoices[idx] = invoice;
        }
        state.editingInvoiceId = null;
        showToast('Invoice updated successfully', 'success');
      } else {
        state.invoices.push(invoice);
        state.nextInvoiceNumber++;
        showToast('Invoice created successfully', 'success');
      }

      state.detailInvoiceId = invoice.id;
      state.currentView = 'invoice-detail';
      saveState();
      renderApp();
      break;
    }

    case 'cancel-edit':
      state.editingInvoiceId = null;
      state.currentView = 'history';
      saveState();
      renderApp();
      break;

    case 'edit-invoice': {
      state.editingInvoiceId = id;
      state.currentView = 'new-invoice';
      saveState();
      renderApp();
      break;
    }

    case 'archive-invoice': {
      const inv = state.invoices.find(i => i.id === id);
      if (inv) {
        inv.archived = true;
        saveState();
        showToast('Invoice archived', 'info');
        renderApp();
      }
      break;
    }

    case 'unarchive-invoice': {
      const inv = state.invoices.find(i => i.id === id);
      if (inv) {
        inv.archived = false;
        saveState();
        showToast('Invoice restored', 'success');
        renderApp();
      }
      break;
    }

    case 'delete-invoice': {
      // 使用自定义确认模态
      showConfirmModal('Delete this invoice permanently?', () => {
        state.invoices = state.invoices.filter(i => i.id !== id);
        saveState();
        showToast('Invoice deleted', 'info');
        if (state.currentView === 'invoice-detail') {
          state.currentView = 'history';
        }
        renderApp();
      });
      break;
    }

    case 'back-to-history':
      state.currentView = 'history';
      state.detailInvoiceId = null;
      saveState();
      renderApp();
      break;

    case 'save-settings': {
      state.profile.chamberName = document.getElementById('set-chamber')?.value.trim() || '';
      state.profile.address = document.getElementById('set-address')?.value.trim() || '';
      state.profile.contact = document.getElementById('set-contact')?.value.trim() || '';
      state.profile.doctorName = document.getElementById('set-doctor')?.value.trim() || '';
      state.profile.currency = document.getElementById('set-currency')?.value.trim() || 'BDT';
      state.profile.currencySymbol = document.getElementById('set-symbol')?.value.trim() || '৳';
      saveState();
      showToast('Profile saved successfully', 'success');
      renderApp();
      break;
    }

    case 'upload-logo':
      document.getElementById('logo-upload-input')?.click();
      break;

    case 'remove-logo':
      state.profile.logo = null;
      saveState();
      showToast('Logo removed', 'info');
      renderApp();
      break;

    case 'export-pdf':
      exportInvoicePDF(id);
      break;

    case 'export-image':
      exportInvoiceImage(id);
      break;

    case 'share-whatsapp':
      shareViaWhatsApp(id);
      break;

    case 'export-all-json':
      exportAllJSON();
      break;

    case 'export-all-excel':
      exportAllExcel();
      break;

    case 'export-all-csv':
      exportAllCSV();
      break;

    case 'import-json':
      document.getElementById('json-import-input')?.click();
      break;

    case 'clear-all-data':
      showConfirmModal('This will permanently delete all invoices and reset settings. Continue?', () => {
        state = getDefaultState();
        saveState();
        showToast('All data cleared', 'info');
        renderApp();
      });
      break;
  }
});

// Logo 上传
document.getElementById('logo-upload-input')?.addEventListener('change', function(e) {
  const file = e.target.files?.[0];
  if (!file) return;
  if (file.size > 2 * 1024 * 1024) {
    showToast('Logo must be under 2MB', 'error');
    return;
  }
  const reader = new FileReader();
  reader.onload = function(ev) {
    state.profile.logo = ev.target.result;
    saveState();
    showToast('Logo uploaded', 'success');
    renderApp();
  };
  reader.readAsDataURL(file);
  e.target.value = '';
});

// JSON 导入
document.getElementById('json-import-input')?.addEventListener('change', function(e) {
  const file = e.target.files?.[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(ev) {
    try {
      const data = JSON.parse(ev.target.result);
      const invoices = Array.isArray(data) ? data : (data.invoices || []);
      let count = 0;
      invoices.forEach(inv => {
        if (inv.id && inv.invoiceNumber && inv.customerName) {
          // 避免重复
          if (!state.invoices.find(i => i.id === inv.id)) {
            state.invoices.push(inv);
            count++;
          }
        }
      });
      // 更新发票编号
      const maxNum = state.invoices.reduce((max, i) => {
        const num = parseInt(i.invoiceNumber?.replace(/\D/g, '')) || 0;
        return num > max ? num : max;
      }, state.nextInvoiceNumber);
      state.nextInvoiceNumber = maxNum + 1;

      saveState();
      showToast(`Imported ${count} invoice${count !== 1 ? 's' : ''}`, 'success');
      renderApp();
    } catch(err) {
      showToast('Invalid JSON file', 'error');
    }
  };
  reader.readAsText(file);
  e.target.value = '';
});

// ---------- 确认模态框 ----------
function showConfirmModal(message, onConfirm) {
  const modal = document.createElement('div');
  modal.className = 'fixed inset-0 z-[150] flex items-center justify-center p-4 modal-backdrop';
  modal.innerHTML = `
    <div class="bg-white rounded-2xl shadow-2xl p-6 w-full max-w-sm modal-enter">
      <h3 class="text-base font-bold text-slate-900 mb-2">Confirm Action</h3>
      <p class="text-sm text-slate-500 mb-6">${message}</p>
      <div class="flex gap-3 justify-end">
        <button class="cancel-btn px-4 py-2 text-sm font-medium border border-gray-200 hover:bg-gray-50 rounded-lg transition-colors">Cancel</button>
        <button class="confirm-btn px-4 py-2 text-sm font-semibold bg-red-600 hover:bg-red-700 text-white rounded-lg transition-colors">Confirm</button>
      </div>
    </div>
  `;
  document.body.appendChild(modal);

  modal.querySelector('.cancel-btn').onclick = () => modal.remove();
  modal.querySelector('.confirm-btn').onclick = () => {
    modal.remove();
    onConfirm();
  };
  modal.addEventListener('click', (e) => {
    if (e.target === modal) modal.remove();
  });
}

// ---------- 导出函数 ----------
function exportInvoicePDF(id) {
  const inv = state.invoices.find(i => i.id === id);
  if (!inv) return;
  showToast('Generating PDF...', 'info');

  const exportDiv = document.getElementById('invoice-export');
  exportDiv.innerHTML = renderInvoiceTemplate(inv);
  exportDiv.style.left = '0';
  exportDiv.style.width = '800px';
  exportDiv.style.background = 'white';
  exportDiv.style.zIndex = '-1';

  setTimeout(() => {
    html2canvas(exportDiv, { scale: 2, useCORS: true, backgroundColor: '#ffffff' }).then(canvas => {
      const { jsPDF } = window.jspdf;
      const pdf = new jsPDF('p', 'mm', 'a4');
      const imgWidth = 210;
      const imgHeight = (canvas.height * imgWidth) / canvas.width;
      pdf.addImage(canvas.toDataURL('image/png'), 'PNG', 0, 0, imgWidth, imgHeight);
      pdf.save(`${inv.invoiceNumber}.pdf`);
      exportDiv.style.left = '-9999px';
      exportDiv.innerHTML = '';
      showToast('PDF downloaded', 'success');
    }).catch(err => {
      console.error(err);
      exportDiv.style.left = '-9999px';
      showToast('PDF generation failed', 'error');
    });
  }, 200);
}

  const inv = state.invoices.find(i => i.id === id);

function shareViaWhatsApp(id) {
  const inv = state.invoices.find(i => i.id === id);
  if (!inv) return;
  const p = state.profile;
  const phone = inv.customerPhone ? inv.customerPhone.replace(/[^0-9+]/g, '') : '';
  const msg = encodeURIComponent(
    `Hello ${inv.customerName}, thank you for visiting ${p.chamberName || 'our chamber'}. Your invoice ${inv.invoiceNumber} for ${p.currency} ${inv.grandTotal.toFixed(2)} is ready. Regards, ${p.doctorName || 'Doctor'}.`
  );
  const url = phone
    ? `https://wa.me/${phone.replace('+', '')}?text=${msg}`
    : `https://wa.me/?text=${msg}`;
  window.open(url, '_blank');
  showToast('Opening WhatsApp...', 'success');
}

function exportAllJSON() {
  if (state.invoices.length === 0) {
    showToast('No invoices to export', 'warning');
    return;
  }
  const data = JSON.stringify(state.invoices, null, 2);
  const blob = new Blob([data], { type: 'application/json' });
  const link = document.createElement('a');
  link.download = `medbill_invoices_${todayISO()}.json`;
  link.href = URL.createObjectURL(blob);
  link.click();
  URL.revokeObjectURL(link.href);
  showToast('JSON exported', 'success');
}
